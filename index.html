  return PURCHASE_KEYWORDS.some(k => lower.includes(k));

// 使用本地時區（避免 UTC 造成跨日偏差）
function localDateStr(d) {
  const now = d || new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}

// CSV 解析（支援引號欄位、BOM、\r\n）
function parseCSV(text) {
  // 明確去除 BOM（U+FEFF）以及常見的不可見前置字元
  const clean = text.replace(/^﻿/, '').replace(/^​/, '');
  const lines = clean.split(/\r?\n/);
  const result = [];
  for (const line of lines) {
    if (!line.trim()) continue;
    const cols = []; let col = '', inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { if (inQuote && line[i+1]==='"') { col+='"'; i++; } else { inQuote=!inQuote; } }
      else if (c===',' && !inQuote) { cols.push(col); col=''; }
      else { col+=c; }
    }
    cols.push(col);
    result.push(cols);
  }
  return result;
}

// 在 headers 陣列中尋找欄位，支援多個別名
function findCol(headers, ...aliases) {
  for (const alias of aliases) {
    const i = headers.findIndex(h => h.replace(/﻿/g,'').trim() === alias);
    if (i >= 0) return i;
  }
  return -1;
}

          fill={s.b[i%s.b.length]} opacity={w<4?0.5:0.75}/>;
      })}
      <rect x="0" y={GH} width="280" height="35" fill={s.ground} opacity="0.65"/>
      <line x1="0" y1={GH} x2="280" y2={GH} stroke={s.glow} strokeWidth="0.8" opacity="0.5"/>
      {/* Window glows */}
      {[[20,66],[55,57],[97,44],[122,32],[150,40],[167,44],[214,57],[265,66]].map(([wx,wy],i)=>(
        <rect key={i} x={wx} y={wy} width="3" height="3.5" rx="0.8" fill={s.win} opacity="0.7"/>
      ))}
    </svg>
  );
}

  // ── Move task → journal ───────────────────────────────────────────────────

  // ── Income helpers ────────────────────────────────────────────────────────

  // ── Journal helpers ───────────────────────────────────────────────────────

  }, []);
  const updateJournal = useCallback((id, patch) => {

  }, []);
  const toggleJournalStar = useCallback((id) => {
    setJournals(prev => prev.map(j => j.id === id ? { ...j, starred: !j.starred } : j));
  }, []);

  // ── Import JSON / CSV ─────────────────────────────────────────────────────
  const handleImportFile = useCallback((e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportResult(null); // 清除上次結果
    e.target.value = '';
    const reader = new FileReader();
    const fname = file.name.toLowerCase();
    const isCsv  = fname.endsWith('.csv');
    const isJson = fname.endsWith('.json');
    if (!isCsv && !isJson) {
      setImportResult({ ok: false, message: '❌ 不支援此格式，請選擇 .csv 或 .json 檔案' });
      return;
    }
    reader.onload = (ev) => {
      const text = ev.target.result;
      if (isCsv) {
        // ── CSV 匯入：記帳明細（支出 + 收入）──────────────────────────────
        try {
          const rows = parseCSV(text);
          if (rows.length < 2) { setImportResult({ ok: false, message: '❌ CSV 檔案為空或格式不正確' }); return; }
          const header = rows[0].map(h => h.replace(/﻿/g,'').trim());

          // 欄位偵測（支援 poinote 格式 + Fortunecity 格式）
          const di = findCol(header,'日期','Recorded At','Date','date','datetime','DateTime','日');
          const ti = findCol(header,'類型','Type','type','收支','收支類型'); // Fortunecity 無此欄，留 -1
          const ni = findCol(header,'標題','note','Note','memo','Memo','Title','title','說明','摘要','項目','備註','Description','desc');
          const ai = findCol(header,'金額','Amount','amount','費用','Price','price');
          const ci = findCol(header,'分類','Category','category','類別');
          const mi = findCol(header,'商家','Account','account','Merchant','merchant','店家','來源');

          // 至少要有：日期、標題（或備註）、金額
          if (di<0 || ni<0 || ai<0) {
            const found = header.slice(0,8).join('、') || '（無）';
            setImportResult({ ok: false, message: `❌ 找不到必要欄位（日期、標題/note、金額）\n你的欄位：${found}` });
            return;
          }

          // Fortunecity 分類 → poinote 分類 對應表
          const FC_CAT_MAP = {
            '飲品':'飲食','飲料':'飲食','食物':'飲食','食品':'飲食',
            '水果':'飲食','蔬菜':'飲食','早餐':'飲食','午餐':'飲食','晚餐':'飲食','餐飲':'飲食',
            '衣服':'購物','服飾':'購物','消費':'購物','網購':'購物',
            '淨靈謝禮':'淨靈','謝禮':'淨靈',
            '美容':'其他','醫藥':'醫療','藥品':'醫療',
            '電費':'居家','水費':'居家','網路':'居家','房租':'居家',
          };

          const newExp=[], newInc=[];
          for (let i=1; i<rows.length; i++) {
            const row=rows[i]; if (row.length<3) continue;

            // 日期：支援 "2026/05/26 19:39"、"2026-05-26"、"2026-05-26T19:39"
            let date = (row[di]?.trim()||'').split(/\s|T/)[0].replace(/\//g,'-');
            if (!date.match(/^\d{4}-\d{2}-\d{2}$/)) continue; // 日期格式不對就跳過

            const name    = row[ni]?.trim()||'';
            const amount  = parseFloat((row[ai]?.trim()||'0').replace(/,/g,''));
            const catRaw  = ci>=0 ? (row[ci]?.trim()||'') : '';
            const merchant= mi>=0 ? (row[mi]?.trim()||'') : '';
            if (!name||!amount||isNaN(amount)||amount<=0) continue;

            // 判斷類型：有明確「類型」欄 → 用欄位值；無 → 以 Category="收入" 判斷
            let type;
            if (ti>=0) {
              type = row[ti]?.trim()||'';
            } else {
              type = (catRaw==='收入'||catRaw==='income'||catRaw==='Income') ? '收入' : '支出';
            }

            // 分類對應
            let catId = null;
            if (type==='支出') {
              const poinoteCat = categories.find(c=>c.label===catRaw||c.id===catRaw)
                || (FC_CAT_MAP[catRaw] ? categories.find(c=>c.label===FC_CAT_MAP[catRaw]||c.id===FC_CAT_MAP[catRaw]) : null);
              catId = poinoteCat ? poinoteCat.id : null;
            }

            if (type==='收入') {
              newInc.push({ id:uid(), title:name, amount, date, note:merchant });
            } else {
              newExp.push({ id:uid(), type:'expense', title:name, amount, date, dueDate:date, category:catId, merchant, note:'', _direct:true });
            }
          }
          if (newExp.length===0&&newInc.length===0) { setImportResult({ ok: false, message: '❌ 未找到可匯入的記帳資料，請確認格式正確' }); return; }
          if (newExp.length>0) setDirectExpenses(prev=>[...prev,...newExp]);
          if (newInc.length>0) setIncomes(prev=>[...prev,...newInc]);
          setImportResult({ ok: true, message: `✅ CSV 匯入成功！${newInc.length} 筆收入、${newExp.length} 筆支出` });
        } catch(err) {
          setImportResult({ ok: false, message: `❌ CSV 解析失敗：${err.message}` });
        }
      } else {
        // ── JSON 匯入：Google Tasks 或 poinote 備份 ───────────────────────
        try {
          const json = JSON.parse(text);
          if (json.kind === 'tasks#taskLists' && Array.isArray(json.items)) {
            // Google Tasks 格式
            const newLists=[], newTasks=[];
            for (const list of json.items) {
              const listId=uid();
              newLists.push({ id:listId, name:list.title||'匯入清單' });
              for (const task of (list.items||[])) {
                newTasks.push({ id:uid(), listId, title:task.title||'', notes:task.notes||'', dueDate:task.due?task.due.slice(0,10):'', completed:task.status==='completed', pinned:false, isPurchase:false, amount:null, category:null, merchant:null, subtasks:[] });
              }
            }
            setLists(prev=>[...prev,...newLists]);
            setTasks(prev=>[...prev,...newTasks]);
            setImportResult({ ok: true, message: `✅ 匯入成功！${newLists.length} 個清單，共 ${newTasks.length} 筆任務` });
          } else if (json.exportDate !== undefined && (json.lists||json.tasks||json.incomes||json.directExpenses)) {
            // poinote 備份格式（以 ID 去重，合併進現有資料）
            const merge = (setter, arr) => {
              if (!Array.isArray(arr)||!arr.length) return 0;
              setter(prev => { const ids=new Set(prev.map(x=>x.id)); return [...prev,...arr.filter(x=>!ids.has(x.id))]; });
              return arr.length;
            };
            const s=[];
            const nl=merge(setLists,json.lists); if(nl) s.push(`${nl}個清單`);
            const nt=merge(setTasks,json.tasks); if(nt) s.push(`${nt}筆任務`);
            const ni=merge(setIncomes,json.incomes); if(ni) s.push(`${ni}筆收入`);
            const ne=merge(setDirectExpenses,json.directExpenses); if(ne) s.push(`${ne}筆支出`);
            merge(setJournals,json.journals);
            merge(setFixedItems,json.fixedItems);
            if (Array.isArray(json.categories)&&json.categories.length) setCategories(json.categories);
            if (Array.isArray(json.journalTypes)&&json.journalTypes.length) setJournalTypes(json.journalTypes);
            setImportResult({ ok: true, message: `✅ 備份匯入成功！${s.join('、')||'無新資料'}` });
          } else {
            setImportResult({ ok: false, message: '❌ 不支援此格式，請使用本 App 備份 JSON、Google Tasks JSON 或記帳 CSV' });
          }
        } catch(err) {
          setImportResult({ ok: false, message: '❌ 檔案解析失敗，請確認是有效的 JSON 格式' });
        }
      }
    };
    reader.readAsText(file);
  }, [categories]);

  // ── Export ───────────────────────────────────────────────────────────────
  const triggerDownload = (content, filename, mime) => {
    if (window.webkit?.messageHandlers?.saveFile) {
      window.webkit.messageHandlers.saveFile.postMessage({ filename, content });
      return;
    }
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const handleExportJSON = useCallback(() => {
    const data = {
      appVersion: APP_VERSION,
      exportDate: new Date().toISOString().slice(0, 10),
      lists, tasks, incomes, directExpenses, fixedItems, journals, categories, journalTypes
    };
    const filename = `計點事備份_${new Date().toISOString().slice(0, 10)}.json`;
    triggerDownload(JSON.stringify(data, null, 2), filename, 'application/json');
  }, [lists, tasks, incomes, directExpenses, fixedItems, journals, categories, journalTypes]);

  const handleExportCSV = useCallback(() => {
    // Expand fixed items to one row per month, from first record month to today
    const allDates = [
      ...directExpenses.map(r => r.date || ''),
      ...incomes.map(i => i.date || '')
    ].filter(d => d.length >= 7).sort();
    const firstMonth = allDates[0]?.slice(0, 7) || null;
    const currentMonth = localDateStr().slice(0, 7);
    const fixedRows = [];
    if (firstMonth && fixedItems.length > 0) {
      const [fy, fm] = firstMonth.split('-').map(Number);
      const [cy, cm] = currentMonth.split('-').map(Number);
      const totalMonths = (cy - fy) * 12 + (cm - fm) + 1;
      for (let i = 0; i < totalMonths; i++) {
        const y = fy + Math.floor((fm - 1 + i) / 12);
        const m = ((fm - 1 + i) % 12) + 1;
        const dateStr = `${y}-${String(m).padStart(2, '0')}-01`;
        fixedItems.forEach(item => {
          fixedRows.push([
            dateStr,
            item.type === 'income' ? '收入' : '支出',
            item.name,
            item.amount,
            item.type === 'expense'
              ? (categories.find(c => c.id === item.category)?.label || item.category || '')
              : '',
            '每月固定'
          ]);
        });
      }
    }
    const rows = [['日期', '類型', '標題', '金額', '分類', '商家']];
    const expRows = directExpenses.map(r => [
      r.date || '', '支出', r.title || '', r.amount || 0,
      categories.find(c => c.id === r.category)?.label || r.category || '',
      r.merchant || ''
    ]);
    const incRows = incomes.map(r => [
      r.date || '', '收入', r.title || '', r.amount || 0, '', ''
    ]);
    [...expRows, ...incRows, ...fixedRows].sort((a, b) => a[0] > b[0] ? -1 : 1).forEach(r => rows.push(r));
    const BOM = '﻿';
    const csv = BOM + rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const filename = `計點事明細_${new Date().toISOString().slice(0, 10)}.csv`;
    triggerDownload(csv, filename, 'text/csv;charset=utf-8');
  }, [directExpenses, incomes, fixedItems, categories]);

  // ── Add List ──────────────────────────────────────────────────────────────
  const handleAddList = () => {
    if (!newListName.trim()) return;
    const id = uid();
    setLists(prev => [...prev, { id, name: newListName.trim() }]);
    setActiveList(id);
    setNewListName('');
    setShowAddList(false);
  };

  const deleteList = (id) => {
    if (lists.length === 1) return;
    setLists(prev => prev.filter(l => l.id !== id));
    setTasks(prev => prev.filter(t => t.listId !== id));
    if (activeList === id) setActiveList(lists.find(l => l.id !== id)?.id || '');
  };

  const renameList = (id, name) => {
    if (!name.trim()) return;
    setLists(prev => prev.map(l => l.id === id ? { ...l, name: name.trim() } : l));
  };

  const ctxValue = useMemo(() => ({
    cats: categories,
    getCat: (id) => categories.find(c => c.id === id) || categories[categories.length - 1],
  }), [categories]);

  if (!splashDone) {
    return <SplashScreen onNavigate={(t) => { setTab(t); setSplashDone(true); }}/>;
  }

  return (
    <CategoriesCtx.Provider value={ctxValue}>
    <div className="h-screen flex flex-col max-w-md mx-auto shadow-xl relative overflow-hidden"
      style={{background:tab==='tasks'?'#EDF8F2':tab==='accounting'?'#FFF8F0':tab==='journal'?'#F4F8FF':'#F2F1EE',transition:'background 0.4s ease'}}>
      {/* Header */}
      <header className="border-b border-[#E8C87A]/30 px-4 pt-10 pb-3 sticky top-0 z-30 relative overflow-hidden"
        style={{background:tab==='tasks'?'#F0FAF4':tab==='accounting'?'#FFF6E8':tab==='journal'?'#EEF4FF':'#EAE9E5',transition:'background 0.4s ease'}}>
        <div className="relative" style={{zIndex:1}}>
        <div className="flex items-center justify-between mb-3">
          <h1 className="flex items-baseline gap-1 leading-none">
            <span style={{fontFamily:'Georgia,serif', fontWeight:700, fontSize:18, color:'#1C1C1E', letterSpacing:0.5}}>p</span>
            <svg width="14" height="19" viewBox="0 0 40 52" style={{display:'inline-block',verticalAlign:'middle',marginBottom:1}}>
              <circle cx="20" cy="34" r="16" fill="none" stroke="#E8940A" strokeWidth="3.8"/>
              <circle cx="20" cy="34" r="6.5" fill="#E8940A"/>
            </svg>
            <span style={{fontFamily:'Georgia,serif', fontWeight:700, fontSize:18, color:'#1C1C1E', letterSpacing:0.5}}>inote</span>
            <span style={{fontSize:12, color:'#E8940A', letterSpacing:4, marginLeft:4}}>計點事</span>
          </h1>
          {tab === 'accounting' && (
            <div className="flex items-center rounded-full p-0.5" style={{background:'rgba(0,0,0,0.07)'}}>
              <button onClick={() => setAcctView('records')}
                className="px-3 py-1.5 rounded-full text-xs font-semibold transition-all"
                style={acctView==='records'?{background:'white',color:'#1C1C1E',boxShadow:'0 1px 3px rgba(0,0,0,0.12)'}:{color:'#8E8E93'}}>
                明細
              </button>
              <button onClick={() => setAcctView('stats')}
                className="px-3 py-1.5 rounded-full text-xs font-semibold transition-all"
                style={acctView==='stats'?{background:'#E8940A',color:'white',boxShadow:'0 1px 3px rgba(232,148,10,0.35)'}:{color:'#8E8E93'}}>
                統計

            </div>
          )}
        </div>
        </div>{/* end relative z-1 content wrapper */}
      </header>

      {/* Main content */}
      <main className="flex-1 overflow-y-auto pb-24 relative" style={{zIndex:10}}
        onTouchStart={e => { pageSwipeX.current = e.touches[0].clientX; }}
        onTouchEnd={e => {
          if (pageSwipeX.current === null) return;
          const dx = e.changedTouches[0].clientX - pageSwipeX.current;

        }}>
        {tab === 'tasks' && (
          <div className="sticky top-0 z-20 px-4 pt-2 pb-2 flex gap-2 overflow-x-auto hide-scrollbar"
            style={{background:'rgba(240,250,244,0.92)', backdropFilter:'blur(8px)', borderBottom:'1px solid rgba(232,200,122,0.18)'}}>
            {lists.map(l => (
              <ListTab
                key={l.id}
                list={l}
                active={activeList === l.id}
                onSelect={() => setActiveList(l.id)}
                onLongPress={() => setListOptionsSheet(l)}

            ))}
            {showAddList ? (
              <div className="flex items-center gap-1">
                <input autoFocus
                  className="border border-gray-300 rounded-full px-3 py-1 text-sm w-28 outline-none focus:ring-2 focus:ring-gray-400/30"

                  onChange={e => setNewListName(e.target.value)}
                  onKeyDown={e => { if(e.key==='Enter' && !e.nativeEvent.isComposing) handleAddList(); if(e.key==='Escape') setShowAddList(false); }}

              <button onClick={() => setShowAddList(true)}

          </div>
        )}
        {tab === 'tasks' && (
          <TasksView
            pinnedTasks={pinnedTasks} activeTasks={currentListTasks} completedTasks={currentListCompleted}
            onToggleComplete={handleCompleteWithPrompt} onTogglePin={togglePin} onDelete={deleteTask}
            onEdit={(task) => setTaskModal({ mode: 'edit', task })} onReorder={reorderTask}
            onAddTask={() => setTaskModal({ mode: 'add', task: null })} onMoveToJournal={moveTaskToJournal}
            onDeleteCompleted={deleteAllCompleted} onUpdateDate={updateTaskDate}

        {tab === 'journal' && (
          <JournalView journals={journals} journalTypes={journalTypes}

            onToggleStar={toggleJournalStar}
          />
        )}
        {tab === 'accounting' && (
          <AccountingView
            allExpenses={accountingRecords}
            allIncomes={incomes}
            filterDate={filterDate}
            onNavigateDate={(dir) => setFilterDate(d => { const nd = new Date(d); nd.setDate(nd.getDate()+dir); return localDateStr(nd); })}

            onEditIncome={(i) => setRecordModal({ mode: 'edit', record: { type: 'income', ...i } })}
            onDeleteIncome={deleteIncome}
            onEditExpense={(r) => r._direct
              ? setRecordModal({ mode: 'edit', record: { type: 'expense', ...r, date: r.dueDate } })

            onDatePickerChange={setAcctPickerOpen}
            subView={acctView}
          />
        )}
        {tab === 'settings' && (
          <SettingsView
            categories={categories} onSaveCategories={setCategories}
            journalTypes={journalTypes} onSaveJournalTypes={setJournalTypes}
            onImportFile={handleImportFile} importResult={importResult}
            onClearImportResult={() => setImportResult(null)}
            onExportJSON={handleExportJSON} onExportCSV={handleExportCSV}
            onClearAllData={() => {
              localStorage.clear();
              window.location.reload();
            }}
          />
        )}
      </main>


      {/* Seasonal city background — bottom, behind nav (z-40) and main (z-10) */}
      {tab !== 'settings' && (
        <div style={{position:'absolute',bottom:0,left:0,right:0,height:'45%',zIndex:5,pointerEvents:'none',overflow:'hidden'}}>
          <div style={{opacity:0.20,height:'100%',display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
            <CityScene tab={tab}/>
          </div>
        </div>
      )}

      {/* Bottom navigation */}
      <nav className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white border-t border-[#E8C87A]/30 flex z-40">

          className={`flex-1 flex flex-col items-center py-3 gap-0.5 transition-colors ${tab==='tasks'?'text-gray-700':'text-gray-400'}`}>
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
          <span className="text-xs font-medium">待辦</span>
        </button>
        <button onClick={() => setTab('accounting')}
          className={`flex-1 flex flex-col items-center py-3 gap-0.5 transition-colors ${tab==='accounting'?'text-[#E8940A]':'text-gray-400'}`}>
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span className="text-xs font-medium">記帳</span>
        </button>
        <button onClick={() => setTab('journal')}
          className={`flex-1 flex flex-col items-center py-3 gap-0.5 transition-colors ${tab==='journal'?'text-[#5B8DB8]':'text-gray-400'}`}>
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          <span className="text-xs font-medium">日誌</span>
        </button>
        <button onClick={() => setTab('settings')}
          className={`flex-1 flex flex-col items-center py-3 gap-0.5 transition-colors ${tab==='settings'?'text-[#8E8E93]':'text-gray-400'}`}>
          <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span className="text-xs font-medium">設定</span>
        </button>
      </nav>

      {/* Tasks: fixed circular "+" button above bottom nav */}
      {tab === 'tasks' && (
        <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md z-30 pointer-events-none">
          <div className="flex justify-center px-6 pb-24 pt-2 pointer-events-auto">
            <button onClick={() => setShowQuickAdd(true)}
              className="w-11 h-11 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all"
              style={{background:'linear-gradient(145deg,#5A5A5A,#2E2E2E)',boxShadow:'0 4px 14px rgba(0,0,0,0.28)'}}>
              <span className="text-white text-2xl leading-none font-light">+</span>
            </button>
          </div>
        </div>
      )}
      {/* Journal: fixed circular "+" button above bottom nav */}
      {tab === 'journal' && (
        <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md z-30 pointer-events-none">
          <div className="flex justify-center px-6 pb-24 pt-2 pointer-events-auto">
            <button onClick={() => setJournalModal({ mode: 'add', journal: null })}
              className="w-11 h-11 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all"
              style={{background:'linear-gradient(145deg,#7AB8DC,#5B8DB8)',boxShadow:'0 4px 14px rgba(91,141,184,0.38)'}}>
              <span className="text-white text-2xl leading-none font-light">+</span>
            </button>
          </div>
        </div>
      )}
      {/* Accounting: fixed circular "+" button above bottom nav */}
      {tab === 'accounting' && acctView !== 'stats' && !acctPickerOpen && (
        <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md z-30 pointer-events-none">
          <div className="flex justify-center px-6 pb-24 pt-2 pointer-events-auto">
            <button onClick={() => setRecordModal({ mode: 'add', record: { date: filterDate } })}
              className="w-11 h-11 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all"

            </button>
          </div>
        </div>

        <FixedItemsModal
          items={fixedItems}
          categories={categories}
          onSave={setFixedItems}
          onClose={() => setFixedModal(false)}
        />
      )}

      {/* Fixed reminder sheet */}
      {fixedReminders && (
        <FixedReminderSheet
          items={fixedReminders}
          categories={categories}
          onSave={(toSave) => {
            const todayStr = localDateStr();
            const done = loadState('fixedReminderDone', {});
            fixedReminders.forEach(i => { done[i.id] = todayStr; });
            saveState('fixedReminderDone', done);
            toSave.forEach(item => {
              if (item.type === 'income') {
                addIncome({ title: item.name, amount: item.amount, date: todayStr, note: '', merchant: '' });
              } else {
                addDirectExpense({ type: 'expense', title: item.name, amount: item.amount, date: todayStr, note: '', category: item.category || null, merchant: '' });
              }
            });
            setFixedReminders(null);
          }}
          onDismiss={() => {
            const todayStr = localDateStr();
            const done = loadState('fixedReminderDone', {});
            fixedReminders.forEach(i => { done[i.id] = todayStr; });
            saveState('fixedReminderDone', done);
            setFixedReminders(null);
          }}
        />
      )}

      {/* List options sheet */}
      {listOptionsSheet && (
        <ListOptionsSheet
          list={listOptionsSheet}
          listsCount={lists.length}
          onRename={renameList}
          onDelete={deleteList}
          onClose={() => setListOptionsSheet(null)}
        />
      )}
      {/* Record modal (income + direct expense) */}
      {recordModal && (
        <RecordModal
          mode={recordModal.mode} record={recordModal.record}
          cats={categories} recentMerchants={recentMerchants}
          onSave={(data) => {
            const isAdd = recordModal.mode === 'add';
            if (data.type === 'income') {
              if (isAdd) addIncome(data);
              else updateIncome(recordModal.record.id, data);
            } else {
              if (isAdd) addDirectExpense(data);
              else updateDirectExpense(recordModal.record.id, data);
            }
            setLastSavedType(data.type);
            // 延遲關閉，讓 touch 事件序列完成，避免 click 穿透到底層 nav
            setTimeout(() => {
              setRecordModal(null);
              if (isAdd) setPostRecordPrompt({ title: data.title, type: data.type });
            }, 80);
          }}
          onDelete={recordModal.mode === 'edit' ? () => {
            if (recordModal.record.type === 'income') deleteIncome(recordModal.record.id);
            else deleteDirectExpense(recordModal.record.id);
            setRecordModal(null);
          } : null}
          onClose={() => setRecordModal(null)}
          onGoToSettings={() => {
            setRecordModal(null);
            setTab('settings');
            setTimeout(() => {
              const el = document.getElementById('categories-section');
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
          }}
        />
      )}
      {/* Post-record prompt: 新增記帳後提示是否加入待辦 */}
      {postRecordPrompt && (
        <PostRecordPrompt
          record={postRecordPrompt}
          onAddTask={() => {
            setTaskModal({ mode: 'add', task: { title: `追蹤：${postRecordPrompt.title}` } });
            setPostRecordPrompt(null);
          }}
          onClose={() => setPostRecordPrompt(null)}
        />
      )}
      {/* Journal modal */}
      {journalModal && (
        <JournalModal mode={journalModal.mode} journal={journalModal.journal} journalTypes={journalTypes}
          onSave={(data) => {
            if (journalModal.mode === 'add') addJournal(data);
            else updateJournal(journalModal.journal.id, data);
            setJournalModal(null);
          }}
          onDelete={journalModal.mode === 'edit' ? () => { deleteJournal(journalModal.journal.id); setJournalModal(null); } : null}
          onClose={() => setJournalModal(null)}
          onGoToSettings={() => {
            setJournalModal(null);
            setTab('settings');
            setTimeout(() => {
              const el = document.getElementById('journal-types-section');
              if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
          }}
        />
      )}
      {/* Quick add bar */}
      {showQuickAdd && (
        <QuickAddBar
          onSave={(data) => { addTask({ ...data, listId: activeList }); setShowQuickAdd(false); }}
          onOpenRecord={(data) => { setShowQuickAdd(false); setRecordModal({ mode: 'add', record: { type: 'expense', ...data } }); }}
          onDetail={(partial) => { setShowQuickAdd(false); setTaskModal({ mode: 'add', task: partial }); }}
          onClose={() => setShowQuickAdd(false)}
        />
      )}
      {/* Task modal */}
      {taskModal && (
        <TaskModal mode={taskModal.mode} task={taskModal.task} lists={lists} activeListId={activeList}
          onSave={(data) => {
            if (taskModal.mode === 'add') addTask({ ...data, listId: activeList });
            else updateTask(taskModal.task.id, data);
            setTaskModal(null);
          }}
          onDelete={taskModal.mode === 'edit' ? () => { deleteTask(taskModal.task.id); setTaskModal(null); } : null}
          onClose={() => setTaskModal(null)}
        />
      )}
      {/* Complete prompt sheet */}
      {completePrompt && (
        <CompleteSheet
          task={completePrompt}
          onConfirm={confirmComplete}
          onCancel={() => setCompletePrompt(null)}
        />
      )}
    </div>
    </CategoriesCtx.Provider>
  );
}

// ── QuickAddBar ────────────────────────────────────────────────────────────
function QuickAddBar({ onSave, onOpenRecord, onDetail, onClose }) {
  const [title, setTitle] = useState('');
  const [dueDate, setDueDate] = useState('');
  const [pinned, setPinned] = useState(false);
  const [acctPrompt, setAcctPrompt] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 60); }, []);

  const extractAmount = (str) => {
    const nums = str.match(/\d+(?:\.\d+)?/g);
    if (!nums) return null;
    return Math.max(...nums.map(Number));
  };

  // 移除時間（12:30）和日期（5/26）格式後再檢查是否有數字
  const strippedForCheck = title.replace(/\d{1,2}:\d{2}/g, '').replace(/\d{1,4}[\/]\d{1,2}/g, '');
  const hasNumber = /\d/.test(strippedForCheck);
  const detectedAmount = hasNumber ? extractAmount(strippedForCheck) : null;

  // 儲存任務（不記帳）
  const doSaveTask = () => {
    if (!title.trim()) return;
    onSave({ title: title.trim(), dueDate, pinned,
      isPurchase: false, amount: null,
      completed: false, notes: '', category: null, merchant: null, labelId: null, subtasks: [] });
  };

  // 儲存任務 + 開啟 RecordModal 預填
  const doSaveWithRecord = () => {
    if (!title.trim()) return;
    const today = localDateStr();
    // 先儲存任務（無記帳旗標）
    onSave({ title: title.trim(), dueDate, pinned,
      isPurchase: false, amount: null,
      completed: false, notes: '', category: null, merchant: null, labelId: null, subtasks: [] });
    // 開啟 RecordModal 預填（使用者可調整分類/名稱/金額）
    onOpenRecord({
      title: title.trim(),
      amount: detectedAmount || '',
      date: dueDate || today,
    });
  };

  const handleSave = () => {
    if (!title.trim()) return;
    if (hasNumber && !acctPrompt) { setAcctPrompt(true); return; }
    doSaveTask();
  };

  return (
    <div className="fixed inset-0 z-50 flex flex-col justify-end">
      <div className="absolute inset-0 bg-black/20" onClick={onClose}/>
      <div className="relative bg-white w-full max-w-md mx-auto rounded-t-2xl shadow-2xl">
        {/* Handle */}
        <div className="flex justify-center pt-3 pb-1">
          <div className="w-10 h-1 bg-gray-200 rounded-full"/>
        </div>
        {/* Input */}
        <div className="px-5 pt-3 pb-3">
          <input
            ref={inputRef}
            autoFocus
            type="text"
            placeholder="新工作"
            value={title}
            onChange={e => { setTitle(e.target.value); setAcctPrompt(false); }}
            onKeyDown={e => {
              if (e.key === 'Enter') e.preventDefault();
            }}
            className="w-full text-base outline-none placeholder-gray-300 border-b border-gray-100 pb-2.5"
          />
        </div>
        {/* Accounting prompt */}
        {acctPrompt && (
          <div className="mx-5 mb-3 bg-gray-100 rounded-xl px-3 py-2.5 flex items-center gap-2">
            <svg className="w-4 h-4 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
            </svg>
            <span className="text-sm text-gray-700 flex-1">
              記入支出明細{detectedAmount ? `（NT$${detectedAmount.toLocaleString()}）` : ''}？
            </span>
            <button onClick={doSaveTask} className="text-sm text-gray-500 px-3 py-1 rounded-lg hover:bg-white">否</button>
            <button onClick={doSaveWithRecord} className="text-sm text-white bg-gray-700 px-3 py-1.5 rounded-lg font-medium">記入</button>
          </div>
        )}
        {/* Bottom action row */}
        <div className="px-4 pb-8 flex items-center gap-1">
          <button onClick={() => onDetail({ title, dueDate, pinned })}
            className="p-2.5 rounded-full text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors" title="詳細設定">
            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
            </svg>
          </button>
          <label className="relative p-2.5 rounded-full cursor-pointer transition-colors hover:bg-gray-100" title="截止日期">
            <svg className={`w-5 h-5 ${dueDate ? 'text-[#E8940A]' : 'text-gray-400'}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <input type="date" value={dueDate} onChange={e => setDueDate(e.target.value)}
              className="absolute inset-0 opacity-0 cursor-pointer" />
          </label>
          <button onClick={() => setPinned(v => !v)}
            className={`p-2.5 rounded-full transition-colors hover:bg-gray-100 ${pinned ? 'text-amber-500' : 'text-gray-400'}`} title="釘選">
            <svg className="w-5 h-5" fill={pinned ? 'currentColor' : 'none'} stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
          <div className="flex-1"/>
          <button onClick={handleSave}
            className={`px-5 py-1.5 rounded-full text-sm font-semibold transition-all ${title.trim() ? 'text-white shadow' : 'bg-gray-100 text-gray-400'}`}
            style={title.trim()?{background:'linear-gradient(135deg,#5A5A5A,#2E2E2E)',boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}:{}}>
            儲存
          </button>
        </div>
      </div>
    </div>
  );
}

// ── TasksView ──────────────────────────────────────────────────────────────
function TasksView({ pinnedTasks, activeTasks, completedTasks, onToggleComplete, onTogglePin, onEdit, onUpdateDate, onReorder, onAddTask, onMoveToJournal, onDeleteCompleted }) {
  const [showCompleted, setShowCompleted] = useState(false);
  const [confirmClear, setConfirmClear] = useState(false);
  // drag: { fromIdx, startY, currentY, itemH, startScrollTop, scrollDelta } | null
  const [drag, setDrag] = useState(null);
  const dragRef = useRef(null);
  const activeTasksRef = useRef(activeTasks);
  const onReorderRef = useRef(onReorder);
  useEffect(() => { activeTasksRef.current = activeTasks; }, [activeTasks]);
  useEffect(() => { onReorderRef.current = onReorder; }, [onReorder]);

  // Total visual displacement = mouse delta + scroll delta
  const totalDelta = (d) => (d.currentY - d.startY) + (d.scrollDelta || 0);

  // overIdx: which slot the dragged item would land in
  const overIdx = drag
    ? Math.max(0, Math.min(activeTasks.length - 1,
        drag.fromIdx + Math.round(totalDelta(drag) / drag.itemH)))
    : -1;

  const handleDragStart = useCallback((fromIdx, startY, itemH) => {
    const mainEl = document.querySelector('main');
    const startScrollTop = mainEl ? mainEl.scrollTop : (window.scrollY || 0);
    const d = { fromIdx, startY, currentY: startY, itemH, startScrollTop, scrollDelta: 0 };
    dragRef.current = d;
    setDrag(d);
  }, []);

  // Attach document-level listeners while dragging (mouse + touch)
  useEffect(() => {
    if (!drag) return;
    const move = (clientY) => {
      const d = { ...dragRef.current, currentY: clientY };
      dragRef.current = d;
      setDrag(d);
    };
    const end = () => {
      const d = dragRef.current;
      if (!d) return;
      const tasks = activeTasksRef.current;
      const reorder = onReorderRef.current;
      const delta = Math.round(totalDelta(d) / d.itemH);
      const toIdx = Math.max(0, Math.min(tasks.length - 1, d.fromIdx + delta));
      dragRef.current = null;
      setDrag(null);
      if (toIdx !== d.fromIdx) reorder(tasks[d.fromIdx].id, d.fromIdx, toIdx);
    };
    const mm = (e) => move(e.clientY);
    const mu = () => end();
    const tm = (e) => { e.preventDefault(); move(e.touches[0].clientY); };
    const te = () => end();
    document.addEventListener('mousemove', mm);
    document.addEventListener('mouseup', mu);
    document.addEventListener('touchmove', tm, { passive: false });
    document.addEventListener('touchend', te);

    // Auto-scroll: top half → scroll up, bottom half → scroll down
    const MAX_SPEED = 14;
    const mainEl = document.querySelector('main');
    const scrollEl = (mainEl && mainEl.scrollHeight > mainEl.clientHeight) ? mainEl : null;
    let rafId;
    const scrollLoop = () => {
      if (!dragRef.current) return;
      const y = dragRef.current.currentY;
      const half = window.innerHeight / 2;
      // speed = 0 at midpoint, ±MAX_SPEED at top/bottom edge
      const speed = y < half
        ? -MAX_SPEED * (1 - y / half)
        : MAX_SPEED * (y - half) / half;
      if (Math.abs(speed) > 0.5) {
        if (scrollEl) scrollEl.scrollTop += speed;
        else window.scrollBy(0, speed);
        // Update scrollDelta so dragOffsetY keeps item under cursor
        const nowTop = scrollEl ? scrollEl.scrollTop : (window.scrollY || 0);
        const scrollDelta = nowTop - dragRef.current.startScrollTop;
        const d = { ...dragRef.current, scrollDelta };
        dragRef.current = d;
        setDrag(d);
      }
      rafId = requestAnimationFrame(scrollLoop);
    };
    rafId = requestAnimationFrame(scrollLoop);

    return () => {
      document.removeEventListener('mousemove', mm);
      document.removeEventListener('mouseup', mu);
      document.removeEventListener('touchmove', tm);
      document.removeEventListener('touchend', te);
      cancelAnimationFrame(rafId);
    };
  }, [!!drag]); // eslint-disable-line react-hooks/exhaustive-deps

  return (
    <div className="fade-in" style={drag ? { userSelect: 'none', cursor: 'grabbing' } : {}}>
      {/* Pinned Section */}
      {pinnedTasks.length > 0 && (
        <section className="mb-2">
          <div className="px-4 pt-4 pb-1 flex items-center gap-2">
            <svg className="w-4 h-4 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span className="text-xs font-semibold text-amber-600 uppercase tracking-wide">已釘選</span>
          </div>
          <div className="space-y-0">
            {pinnedTasks.map(task => (
              <TaskItem key={task.id} task={task} pinned
                onToggleComplete={onToggleComplete} onTogglePin={onTogglePin}
                onEdit={onEdit} onUpdateDate={onUpdateDate} onMoveToJournal={onMoveToJournal}
              />
            ))}
          </div>
        </section>
      )}

      {/* Active Tasks */}
      <section className="pt-2">
        {activeTasks.length === 0 && (
          <div className="flex flex-col items-center py-16 text-gray-400">
            <svg className="w-16 h-16 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            <p className="text-sm">沒有待辦事項</p>
            <button onClick={onAddTask} className="mt-3 text-gray-500 text-sm font-medium hover:underline">+ 新增任務</button>
          </div>
        )}
        <div className="space-y-0">
          {activeTasks.map((task, idx) => {
            let shift = 0;
            if (drag) {
              const { fromIdx } = drag;
              if (fromIdx < overIdx && idx > fromIdx && idx <= overIdx) shift = -1;
              else if (fromIdx > overIdx && idx >= overIdx && idx < fromIdx) shift = 1;
            }
            return (
              <TaskItem key={task.id} task={task}
                onToggleComplete={onToggleComplete} onTogglePin={onTogglePin}
                onEdit={onEdit} onUpdateDate={onUpdateDate}
                onDragStart={handleDragStart} taskIndex={idx}
                isDragging={!!drag && drag.fromIdx === idx}
                dragOffsetY={drag && drag.fromIdx === idx ? totalDelta(drag) : 0}
                shift={shift} dragItemH={drag ? drag.itemH : 0}
                onMoveToJournal={onMoveToJournal}
              />
            );
          })}
        </div>
      </section>

      {/* Completed section */}
      {completedTasks.length > 0 && (
        <section className="mt-4 px-4">
          <div className="flex items-center justify-between mb-2">
            <button onClick={() => setShowCompleted(v=>!v)}
              className="flex items-center gap-2 text-sm text-gray-500 font-medium">
              <svg className={`w-4 h-4 transition-transform ${showCompleted?'rotate-90':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
              已完成 ({completedTasks.length})
            </button>
            {!confirmClear
              ? <button onClick={() => setConfirmClear(true)} className="text-xs text-gray-400 hover:text-red-400 transition-colors">清除全部</button>
              : <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-500">確定清除？</span>
                  <button onClick={() => { onDeleteCompleted(); setConfirmClear(false); }}
                    className="text-xs text-white bg-red-400 px-2 py-0.5 rounded-full font-medium">確定</button>
                  <button onClick={() => setConfirmClear(false)}
                    className="text-xs text-gray-400">取消</button>
                </div>
            }
          </div>
          {showCompleted && (
            <div className="space-y-0">
              {completedTasks.map(task => (
                <TaskItem key={task.id} task={task}
                  onToggleComplete={onToggleComplete} onTogglePin={onTogglePin}
                  onEdit={onEdit} onUpdateDate={onUpdateDate} onMoveToJournal={onMoveToJournal}
                />
              ))}
            </div>
          )}
        </section>
      )}

    </div>
  );
}

// ── TaskItem ───────────────────────────────────────────────────────────────
function TaskItem({ task, pinned, onToggleComplete, onTogglePin, onEdit, onUpdateDate,
                    onDragStart, taskIndex, isDragging, dragOffsetY, shift, dragItemH,
                    onMoveToJournal }) {
  const { getCat } = React.useContext(CategoriesCtx);
  const cat = task.isPurchase && task.category ? getCat(task.category) : null;
  const itemRef = React.useRef(null);
  const dragPressTimer = React.useRef(null);
  const dragTouchStart = React.useRef({ x: 0, y: 0 });
  const dragTouchCurrent = React.useRef({ x: 0, y: 0 });

  const startDrag = (clientY) => {
    if (!onDragStart) return;
    onDragStart(taskIndex, clientY, itemRef.current ? itemRef.current.offsetHeight : 60);
  };

  const handleDragTouchStart = (e) => {
    e.stopPropagation();
    const t = e.touches[0];
    dragTouchStart.current = { x: t.clientX, y: t.clientY };
    dragTouchCurrent.current = { x: t.clientX, y: t.clientY };
    dragPressTimer.current = setTimeout(() => {
      dragPressTimer.current = null;
      startDrag(dragTouchCurrent.current.y);
    }, 350);
  };

  const handleDragTouchMove = (e) => {
    if (!dragPressTimer.current) return;
    const t = e.touches[0];
    dragTouchCurrent.current = { x: t.clientX, y: t.clientY };
    const dx = Math.abs(t.clientX - dragTouchStart.current.x);
    const dy = Math.abs(t.clientY - dragTouchStart.current.y);
    if (dx > 10 || dy > 10) {
      clearTimeout(dragPressTimer.current);
      dragPressTimer.current = null;
    }
  };

  const handleDragTouchEnd = () => {
    if (dragPressTimer.current) {
      clearTimeout(dragPressTimer.current);
      dragPressTimer.current = null;
    }
  };

  const style = isDragging
    ? { transform: `translateY(${dragOffsetY}px)`, transition: 'none', zIndex: 50, position: 'relative' }
    : shift
      ? { transform: `translateY(${shift * dragItemH}px)`, transition: 'transform 150ms ease' }
      : {};

  return (
    <div
      ref={itemRef}
      className={`task-enter bg-white border-b border-gray-50 px-4 py-3 ${pinned?'bg-amber-50 border-amber-100 pin-glow mx-3 rounded-xl mb-2':''} ${isDragging?'shadow-2xl opacity-80':''}`}
      style={style}
    >
      <div className="flex items-center gap-3">
        <div className="flex-shrink-0">
          <input type="checkbox" className="checkbox-custom"
            checked={task.completed} onChange={() => onToggleComplete(task.id)} />
        </div>
        <div className="flex-1 min-w-0" onClick={() => onEdit(task)}>
          <div className={`font-medium text-sm leading-snug ${task.completed?'line-through text-gray-400':'text-gray-800'}`}>
            {task.title}
          </div>
          {(task.dueDate || task.isPurchase && task.amount || task.subtasks?.length > 0) && (
            <div className="flex items-center gap-2 mt-0.5">
              {task.dueDate && (
                <span className={`text-xs flex items-center gap-0.5 ${
                  !task.completed && task.dueDate < localDateStr() ? 'text-[#FF3B30]' : 'text-gray-400'
                }`}>
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  {task.dueDate}
                </span>
              )}
              {task.isPurchase && task.amount && (
                <span className="text-xs text-[#FF3B30] font-medium">NT${task.amount.toLocaleString()}</span>
              )}
              {task.subtasks?.length > 0 && (
                <span className="text-xs text-gray-400">{task.subtasks.filter(s=>s.completed).length}/{task.subtasks.length}</span>
              )}
            </div>
          )}
        </div>
        <div className="flex items-center gap-1 ml-1">
          {task.completed && onMoveToJournal && (
            <button onClick={() => onMoveToJournal(task)}
              className="p-1 text-gray-300 hover:text-rose-400 transition-colors" title="記錄到重要日誌">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            </button>
          )}
          {onDragStart && (
            <button
              className="p-1.5 text-gray-300 cursor-grab touch-none"
              onTouchStart={handleDragTouchStart}
              onTouchMove={handleDragTouchMove}
              onTouchEnd={handleDragTouchEnd}
              onMouseDown={e => { e.preventDefault(); startDrag(e.clientY); }}
              title="長按拖移排序">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8h16M4 16h16"/>
              </svg>
            </button>
          )}
          <button onClick={() => onTogglePin(task.id)}
            className={`p-1 transition-colors ${task.pinned ? 'text-amber-500' : 'text-gray-300 hover:text-gray-600'}`}
            title={task.pinned?'取消釘選':'釘選'}>
            {task.pinned
              ? <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
              : <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            }
          </button>
        </div>
      </div>
      {task.subtasks?.length > 0 && (
        <div className="ml-8 mt-2 space-y-1">
          {task.subtasks.map(st => (
            <div key={st.id} className="flex items-center gap-2 text-xs text-gray-500">
              <span className={`w-3.5 h-3.5 rounded-full border flex items-center justify-center flex-shrink-0 ${st.completed?'bg-[#E8940A] border-[#E8940A] text-white':'border-gray-300'}`}>
                {st.completed && <svg className="w-2 h-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/></svg>}
              </span>
              <span className={st.completed?'line-through text-gray-400':''}>{st.title}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── TaskModal ──────────────────────────────────────────────────────────────

// ── DonutChart ─────────────────────────────────────────────────────────────
function DonutChart({ slices, total, getCat, activeCat, onSliceClick }) {
  const cx = 150, cy = 150, R = 95, ir = 60, LR = 122;
  let angle = -Math.PI / 2;
  const segments = slices.map(({ hex, amount, cat }) => {
    const frac = total > 0 ? amount / total : 0;
    const sweep = frac * 2 * Math.PI;
    const sa = angle;
    angle += sweep;
    const ma = sa + sweep / 2;
    const large = frac > 0.5 ? 1 : 0;
    const x1 = cx + R * Math.cos(sa),   y1 = cy + R * Math.sin(sa);
    const x2 = cx + R * Math.cos(angle),y2 = cy + R * Math.sin(angle);
    const ix1 = cx + ir * Math.cos(sa), iy1 = cy + ir * Math.sin(sa);
    const ix2 = cx + ir * Math.cos(angle), iy2 = cy + ir * Math.sin(angle);
    const d = `M${ix1},${iy1} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${large},0 ${ix1},${iy1} Z`;
    return { hex, cat, frac, pct: Math.round(frac * 100), d, lx: cx + LR * Math.cos(ma), ly: cy + LR * Math.sin(ma) };
  });
  return (
    <svg viewBox="0 0 300 300" className="w-full max-w-[260px] mx-auto drop-shadow-sm">
      {segments.map((s, i) => s.frac > 0.005 && (
        <path key={i} d={s.d} fill={s.hex}
          opacity={activeCat && activeCat !== s.cat ? 0.25 : 1}
          onClick={() => onSliceClick(s.cat)}
          style={{cursor:'pointer', transition:'opacity 0.2s'}}/>
      ))}
      <text x={cx} y={cy-8}  textAnchor="middle" fill="#8E8E93" fontSize="13">支出</text>
      <text x={cx} y={cy+16} textAnchor="middle" fill="#FF3B30" fontSize="20" fontWeight="700">${total.toLocaleString()}</text>
      {segments.map((s, i) => {
        if (s.pct < 5) return null;
        const info = getCat(s.cat);
        const Icon = CAT_SVG[s.cat];
        return (
          <g key={`l${i}`} style={{cursor:'pointer'}} onClick={() => onSliceClick(s.cat)}>
            <foreignObject x={s.lx-16} y={s.ly-16} width="32" height="32">
              <div xmlns="http://www.w3.org/1999/xhtml" style={{width:'32px',height:'32px',borderRadius:'8px',background:s.hex+'18',display:'flex',alignItems:'center',justifyContent:'center',color:s.hex,overflow:'hidden'}}>
                {Icon ? <Icon size={15}/> : <span style={{fontSize:'13px'}}>{info.emoji}</span>}
              </div>
            </foreignObject>
            <text x={s.lx} y={s.ly+26} textAnchor="middle" fill="#9CA3AF" fontSize="10" fontWeight="600">{s.pct}%</text>
          </g>
        );
      })}
    </svg>
  );
}
