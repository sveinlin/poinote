// ── FixedItemsModal ────────────────────────────────────────────────────────
function FixedItemsModal({ items, categories, onSave, onClose }) {
  const [tab, setTab] = useState('income');
  const [editingId, setEditingId] = useState(null); // null = add mode
  const [name, setName] = useState('');
  const [amtExpr, setAmtExpr] = useState('');
  const [prevVal, setPrevVal] = useState(null);
  const [pendingOp, setPendingOp] = useState(null);
  const [category, setCategory] = useState(categories[0]?.id || '');
  const [reminderSchedule, setReminderSchedule] = useState(null); // null | {mode,day}
  const [showDayPicker, setShowDayPicker] = useState(false);

  const shown = items.filter(i => i.type === tab);
  const isIncome = tab === 'income';
  const accent = isIncome ? '#34C759' : '#FF3B30';

  const computedAmt = () => {
    const cur = parseFloat(amtExpr) || 0;
    if (pendingOp !== null && prevVal !== null)
      return pendingOp === '+' ? prevVal + cur : Math.max(0, prevVal - cur);
    return cur;
  };
  const amtNum = computedAmt();
  const displayStr = '$' + (amtNum > 0 ? amtNum.toLocaleString() : (amtExpr || '0'));

  const pressKey = (key) => {
    if (key === '⌫') {
      if (amtExpr.length > 0) { setAmtExpr(e => e.slice(0, -1)); return; }
      if (pendingOp !== null) { setAmtExpr(String(prevVal ?? '')); setPrevVal(null); setPendingOp(null); }
      return;
    }
    if (key === '+' || key === '−') {
      const cur = parseFloat(amtExpr) || 0;
      const base = (pendingOp !== null && prevVal !== null)
        ? (pendingOp === '+' ? prevVal + cur : Math.max(0, prevVal - cur))
        : cur;
      setPrevVal(base); setPendingOp(key); setAmtExpr('');
      return;
    }
    if (key === '.') { setAmtExpr(e => e.includes('.') ? e : e + '.'); return; }
    if (amtExpr.length >= 10) return;
    setAmtExpr(e => e === '0' ? key : e + key);
  };

  const startEdit = (item) => {
    setEditingId(item.id);
    setName(item.name);
    resetAmt(); setAmtExpr(String(item.amount));
    setCategory(item.category || categories[0]?.id || '');
    setReminderSchedule(item.reminderSchedule || null);
  };
  const resetAmt = () => { setAmtExpr(''); setPrevVal(null); setPendingOp(null); };
  const cancelEdit = () => { setEditingId(null); setName(''); resetAmt(); setCategory(categories[0]?.id || ''); setReminderSchedule(null); };

  const handleSave = () => {
    if (!name.trim() || amtNum <= 0) return;
    if (editingId) {
      onSave(items.map(i => i.id !== editingId ? i : {
        ...i, name: name.trim(), amount: amtNum,
        category: i.type === 'expense' ? (category || null) : null,
        reminderSchedule: reminderSchedule || null,
      }));
      setEditingId(null);
    } else {
      onSave([...items, { id: uid(), name: name.trim(), amount: amtNum, type: tab, category: tab === 'expense' ? (category || null) : null, reminderSchedule: reminderSchedule || null }]);
    }
    setName(''); resetAmt(); setCategory(categories[0]?.id || ''); setReminderSchedule(null);
  };
  const deleteItem = (id) => onSave(items.filter(i => i.id !== id));

  const kpBtn = (label, type) => {
    const base = 'flex items-center justify-center h-[56px] rounded-2xl text-xl font-semibold active:opacity-60 transition-opacity select-none cursor-pointer';
    const kpStyle = { touchAction: 'manipulation' };
    if (type === 'op') return (
      <button key={label} onPointerDown={e=>{e.preventDefault();pressKey(label);}} className={`${base} text-[#FF9500] text-2xl`} style={kpStyle}>{label}</button>
    );
    if (type === 'del') return (
      <button key="del" onPointerDown={e=>{e.preventDefault();pressKey('⌫');}} className={`${base} text-[#FF9500]`} style={kpStyle}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="15" y1="9" x2="19" y2="13"/><line x1="19" y1="9" x2="15" y2="13"/>
        </svg>
      </button>
    );
    if (type === 'confirm') return (
      <button key="confirm" onPointerDown={e=>{e.preventDefault();handleSave();}} className={`${base} text-[#FF9500]`} style={kpStyle}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12l5 5L19 7"/>
        </svg>
      </button>
    );
    if (type === 'empty') return <div key={label} className={base}/>;
    return <button key={label} onPointerDown={e=>{e.preventDefault();pressKey(label);}} className={`${base} text-white`} style={kpStyle}>{label}</button>;
  };

  return (
    <>
    <div className="fixed inset-0 bg-black/40 z-50 flex items-end" onClick={onClose}>
      <div className="relative flex flex-col w-full max-w-md mx-auto rounded-t-3xl overflow-hidden shadow-2xl"
        style={{maxHeight:'92vh', background:'#FAF6F1'}} onClick={e => e.stopPropagation()}>

        {/* Scrollable top */}
        <div className="overflow-y-auto flex-1 min-h-0">
          {/* Handle + header */}
          <div className="flex justify-center pt-3 pb-0"><div className="w-10 h-1 bg-gray-300 rounded-full"/></div>
          <div className="flex items-center justify-between px-4 pt-3 pb-2">
            <div className="text-base font-bold text-gray-800">
              {editingId ? '編輯固定項目' : '每月固定項目'}
            </div>
            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/80 text-gray-500 shadow-sm">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>

          {/* Tab toggle */}
          {!editingId && (
            <div className="mx-4 mb-2 flex bg-white rounded-xl p-0.5 shadow-sm">
              {[['income','固定收入','#34C759'],['expense','固定支出','#FF3B30']].map(([tabId,label,clr]) => (
                <button key={tabId} onClick={() => { setTab(tabId); resetAmt(); }}
                  className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${tab===tabId?'shadow':''}`}
                  style={tab===tabId?{background:'#1C1C1E',color:'#FFF'}:{color:'#9CA3AF'}}>
                  {label}
                </button>
              ))}
            </div>
          )}

          {/* Name input */}
          <div className="mx-4 mt-2 bg-white rounded-2xl shadow-sm px-4 py-2.5 flex items-center gap-2">
            <svg className="w-4 h-4 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6h16M4 12h16M4 18h7"/>
            </svg>
            <input type="text" value={name} onChange={e => setName(e.target.value)}
              placeholder={isIncome ? '項目名稱（如：薪資）' : '項目名稱（如：房租）'}
              className="flex-1 text-sm text-gray-600 outline-none placeholder-gray-300 bg-transparent"/>
          </div>

          {/* Reminder schedule row */}
          <button onClick={() => setShowDayPicker(true)}
            className="mx-4 mt-2 bg-white rounded-2xl shadow-sm px-4 py-3 flex items-center justify-between w-auto active:opacity-80">
            <span className="text-sm text-gray-600">規律記帳時間</span>
            <div className="flex items-center gap-1.5">
              <span className={`text-sm ${reminderSchedule ? 'text-[#E8940A] font-medium' : 'text-gray-300'}`}>
                {scheduleText(reminderSchedule)}
              </span>
              <svg className="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/>
              </svg>
            </div>
          </button>

          {/* Amount display */}
          <div className="px-5 pt-3 pb-2">
            {pendingOp !== null && prevVal !== null && (
              <div className="text-right text-sm text-gray-400 mb-0.5">{prevVal.toLocaleString()} {pendingOp}</div>
            )}
            <div className="text-right font-light" style={{
              color: '#1C1C1E',
              fontSize: displayStr.length > 10 ? '2.4rem' : displayStr.length > 7 ? '2.8rem' : '3.2rem',
              lineHeight: 1.1
            }}>
              {displayStr}
            </div>
          </div>

          {/* Category grid (expense only) */}
          {!isIncome && categories && (
            <div className="mx-3 bg-white rounded-2xl shadow-sm px-2 py-3">
              <div className="grid grid-cols-5 gap-y-3">
                {categories.map(c => {
                  const isSelected = category === c.id;
                  const IconComp = CAT_SVG[c.id];
                  return (
                    <button key={c.id} onClick={() => setCategory(c.id)} className="flex flex-col items-center gap-1">
                      <div className="w-11 h-11 rounded-2xl flex items-center justify-center transition-all"
                        style={{background: isSelected ? c.hex+'30' : c.hex+'18', color: c.hex, boxShadow: isSelected ? `0 0 0 2px white, 0 0 0 3px ${c.hex}` : 'none'}}>
                        {IconComp ? <IconComp size={20}/> : <span className="text-lg">{c.emoji}</span>}
                      </div>
                      <span className={`text-[10px] font-medium leading-tight text-center transition-colors ${isSelected ? 'text-gray-800' : 'text-gray-400'}`}>{c.label}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          )}

          {/* Existing items list */}
          {!editingId && shown.length > 0 && (
            <div className="mx-3 mt-3 mb-2">
              <div className="text-xs font-semibold text-gray-400 px-1 mb-1.5">已設定</div>
              <div className="bg-white rounded-2xl shadow-sm divide-y divide-gray-50 overflow-hidden">
                {shown.map(item => (
                  <div key={item.id} className="flex items-center gap-3 px-4 py-3">
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium text-gray-800 truncate">{item.name}</div>
                      <div className="flex items-center gap-2 flex-wrap">
                        {item.category && <span className="text-xs text-gray-400">{categories.find(c=>c.id===item.category)?.emoji} {categories.find(c=>c.id===item.category)?.label}</span>}
                        {item.reminderSchedule ? <span className="text-xs text-[#E8940A] font-medium">📅 {scheduleText(item.reminderSchedule)}</span> : <span className="text-xs text-gray-300">無提醒</span>}
                      </div>
                    </div>
                    <div className="text-sm font-bold flex-shrink-0" style={{color:accent}}>NT${item.amount.toLocaleString()}</div>
                    <button onClick={() => startEdit(item)} className="text-xs text-[#E8940A] px-2 py-1 rounded-lg bg-[#FEF3DC]">編輯</button>
                    <button onClick={() => deleteItem(item.id)} className="p-1 text-gray-300 active:text-red-400">
                      <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}
          {editingId && (
            <div className="mx-4 mt-2 mb-2">
              <button onClick={cancelEdit} className="text-sm text-gray-400 underline">取消編輯</button>
            </div>
          )}
          <div className="h-2"/>
        </div>

        {/* Dark keypad */}
        <div className="flex-shrink-0 bg-[#1C1C1E] px-3 pt-3 pb-8">
          <div className="grid grid-cols-4 gap-2">
            {kpBtn('7','n')} {kpBtn('8','n')} {kpBtn('9','n')} {kpBtn('⌫','del')}
            {kpBtn('4','n')} {kpBtn('5','n')} {kpBtn('6','n')} {kpBtn('+','op')}
            {kpBtn('1','n')} {kpBtn('2','n')} {kpBtn('3','n')} {kpBtn('−','op')}
            {kpBtn('','empty')} {kpBtn('0','n')} {kpBtn('.','n')} {kpBtn('✓','confirm')}
          </div>
        </div>
      </div>
    </div>
    {showDayPicker && (
      <DayPickerSheet
        value={reminderSchedule}
        onSelect={s => setReminderSchedule(s)}
        onClose={() => setShowDayPicker(false)}
      />
    )}
    </>
  );
}

// ── AccountingView ─────────────────────────────────────────────────────────
function AccountingView({ allExpenses, allIncomes, filterDate, onNavigateDate, onGoToday, onJumpToDate, fixedItems = [], onManageFixed, onEditExpense, onDeleteExpense, onEditIncome, onDeleteIncome, subView = 'records', onDatePickerChange }) {
  const { getCat } = React.useContext(CategoriesCtx);
  const todayStr = localDateStr();
  const isToday = filterDate === todayStr;
  const touchStartX = useRef(null);
  const [activeCat, setActiveCat] = useState(null);
  const [fixedExpanded, setFixedExpanded] = useState(false);
  const [showDatePicker, setShowDatePicker] = useState(false);
  const [calDisplayMonth, setCalDisplayMonth] = useState(filterDate.slice(0,7));
  useEffect(() => {
    if (showDatePicker) setCalDisplayMonth(filterDate.slice(0,7));
    onDatePickerChange?.(showDatePicker);
  }, [showDatePicker]);

  const navigateCalMonth = (dir) => setCalDisplayMonth(prev => {
    const [y, m] = prev.split('-').map(Number);
    const nd = new Date(y, m - 1 + dir, 1);
    return `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
  });

  const calDays = useMemo(() => {
    const [cy, cm] = calDisplayMonth.split('-').map(Number);
    const firstDow = new Date(cy, cm - 1, 1).getDay();
    const dim = new Date(cy, cm, 0).getDate();
    const prevY = cm===1?cy-1:cy, prevM = cm===1?12:cm-1;
    const nextY = cm===12?cy+1:cy, nextM = cm===12?1:cm+1;
    const prevDim = new Date(prevY, prevM, 0).getDate();
    const days = [];
    for (let i = firstDow-1; i >= 0; i--) {
      const d = prevDim - i;
      days.push({ day:d, date:`${prevY}-${String(prevM).padStart(2,'0')}-${String(d).padStart(2,'0')}`, other:true });
    }
    for (let d = 1; d <= dim; d++) {
      const s = `${cy}-${String(cm).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      days.push({ day:d, date:s, today:s===todayStr, selected:s===filterDate });
    }
    let nd = 1;
    while (days.length % 7 !== 0) {
      days.push({ day:nd, date:`${nextY}-${String(nextM).padStart(2,'0')}-${String(nd).padStart(2,'0')}`, other:true });
      nd++;
    }
    return days;
  }, [calDisplayMonth, filterDate, todayStr]);

  // Stats: derive month from current filterDate
  const statsMonth = filterDate ? filterDate.slice(0, 7) : todayStr.slice(0, 7);
  const [statsMonthState, setStatsMonth] = useState(statsMonth);
  const [statsPeriod, setStatsPeriod] = useState('month'); // 'all'|'week'|'month'|'year'|'custom'
  const [statsYearState, setStatsYear] = useState(todayStr.slice(0, 4));
  const [customStart, setCustomStart] = useState(() => todayStr.slice(0,7) + '-01');
  const [customEnd, setCustomEnd] = useState(todayStr);
  useEffect(() => { setStatsMonth(filterDate.slice(0,7)); setStatsYear(filterDate.slice(0,4)); }, [filterDate]);

  const navigateStatsMonth = (dir) => {
    setStatsMonth(m => {
      const [y, mo] = m.split('-').map(Number);
      const nd = new Date(y, mo - 1 + dir, 1);
      return `${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
    });
  };

  // Day view data
  const dayExpenses = useMemo(() =>
    [...allExpenses.filter(r => (r.dueDate || '') === filterDate)]
      .sort((a,b) => (b.id||'').localeCompare(a.id||'')),
    [allExpenses, filterDate]
  );
  const dayIncomes = useMemo(() =>
    [...allIncomes.filter(i => (i.date || '') === filterDate)]
      .sort((a,b) => (b.id||'').localeCompare(a.id||'')),
    [allIncomes, filterDate]
  );
  const dayExpenseTotal = dayExpenses.reduce((s, r) => s + (r.amount || 0), 0);
  const dayIncomeTotal  = dayIncomes.reduce((s, i) => s + (i.amount || 0), 0);
  const hasRecords = dayExpenses.length > 0 || dayIncomes.length > 0;

  // Stats view data (monthly)
  const monthExpenses = useMemo(() =>
    allExpenses.filter(r => (r.dueDate||'').slice(0,7) === statsMonthState),
    [allExpenses, statsMonthState]
  );
  const monthIncomes = useMemo(() =>
    allIncomes.filter(i => (i.date||'').slice(0,7) === statsMonthState),
    [allIncomes, statsMonthState]
  );
  const fixedIncomes  = fixedItems.filter(i => i.type === 'income');
  const fixedExpenses = fixedItems.filter(i => i.type === 'expense');
  const fixedInTotal  = fixedIncomes.reduce((s,i) => s + i.amount, 0);
  const fixedExTotal  = fixedExpenses.reduce((s,i) => s + i.amount, 0);
  const monthExpTotal = monthExpenses.reduce((s,r) => s + (r.amount||0), 0);
  const monthIncTotal = monthIncomes.reduce((s,i) => s + (i.amount||0), 0);
  const adjExpTotal   = monthExpTotal + fixedExTotal;
  const adjIncTotal   = monthIncTotal + fixedInTotal;
  const adjBalance    = adjIncTotal - adjExpTotal;

  const firstRecordMonth = useMemo(() => {
    const dates = [
      ...allExpenses.map(r => (r.dueDate||'').slice(0,7)),
      ...allIncomes.map(i => (i.date||'').slice(0,7))
    ].filter(d => d.length === 7).sort();
    return dates[0] || null;
  }, [allExpenses, allIncomes]);

  const categoryTotals = useMemo(() => {
    const m = {};
    monthExpenses.forEach(r => { const c = r.category || '其他'; m[c] = (m[c]||0) + (r.amount||0); });
    return Object.entries(m).sort((a,b) => b[1]-a[1]);
  }, [monthExpenses]);
  const categoryCounts = useMemo(() => {
    const m = {};
    monthExpenses.forEach(r => { const c = r.category||'其他'; m[c]=(m[c]||0)+1; });
    return m;
  }, [monthExpenses]);
  const pieSlices = useMemo(() =>
    categoryTotals.map(([cat,amt]) => ({ hex: getCat(cat).hex, amount: amt, cat })),
    [categoryTotals, getCat]
  );

  const dateLabel = useMemo(() => {
    if (isToday) return '今日';
    const [y, mo, d] = filterDate.split('-');
    return `${y}/${parseInt(mo)}/${parseInt(d)}`;
  }, [filterDate, isToday]);

  // Stats: group expenses by day for the month, show a daily list
  const monthGrouped = useMemo(() => {
    const g = {};
    [...monthExpenses, ...monthIncomes.map(i => ({...i, _income:true, dueDate:i.date}))]
      .sort((a,b) => (b.dueDate||b.date||'').localeCompare(a.dueDate||a.date||''))
      .forEach(r => {
        const k = r.dueDate || r.date || '__';
        if (!g[k]) g[k] = [];
        g[k].push(r);
      });
    return Object.entries(g).sort((a,b) => b[0].localeCompare(a[0]));
  }, [monthExpenses, monthIncomes]);

  // Stats: year view data
  const yearExpenses = useMemo(() =>
    allExpenses.filter(r => (r.dueDate||'').slice(0,4) === statsYearState),
    [allExpenses, statsYearState]
  );
  const yearIncomes = useMemo(() =>
    allIncomes.filter(i => (i.date||'').slice(0,4) === statsYearState),
    [allIncomes, statsYearState]
  );
  const yearExpTotal = yearExpenses.reduce((s,r) => s + (r.amount||0), 0);
  const yearIncTotal = yearIncomes.reduce((s,i) => s + (i.amount||0), 0);
  const yearBalance  = yearIncTotal - yearExpTotal;
  const yearCategoryTotals = useMemo(() => {
    const m = {};
    yearExpenses.forEach(r => { const c = r.category||'其他'; m[c]=(m[c]||0)+(r.amount||0); });
    return Object.entries(m).sort((a,b) => b[1]-a[1]);
  }, [yearExpenses]);
  const yearCategoryCounts = useMemo(() => {
    const m = {};
    yearExpenses.forEach(r => { const c = r.category||'其他'; m[c]=(m[c]||0)+1; });
    return m;
  }, [yearExpenses]);
  const yearPieSlices = useMemo(() =>
    yearCategoryTotals.map(([cat,amt]) => ({ hex: getCat(cat).hex, amount: amt, cat })),
    [yearCategoryTotals, getCat]
  );
  const yearGrouped = useMemo(() => {
    const g = {};
    [...yearExpenses, ...yearIncomes.map(i => ({...i, _income:true, dueDate:i.date}))]
      .forEach(r => { const k = (r.dueDate||r.date||'').slice(0,7); if (!g[k]) g[k]=[]; g[k].push(r); });
    return Object.entries(g).sort((a,b) => b[0].localeCompare(a[0]));
  }, [yearExpenses, yearIncomes]);

  // Stats: week data (last 7 days)
  const weekStart = useMemo(() => { const d = new Date(); d.setDate(d.getDate()-6); return localDateStr(d); }, []);
  const weekExpenses = useMemo(() => allExpenses.filter(r => { const d=r.dueDate||''; return d>=weekStart&&d<=todayStr; }), [allExpenses, weekStart, todayStr]);
  const weekIncomes  = useMemo(() => allIncomes.filter(i  => { const d=i.date||'';  return d>=weekStart&&d<=todayStr; }), [allIncomes,  weekStart, todayStr]);
  const weekGrouped  = useMemo(() => {
    const g = {};
    [...weekExpenses, ...weekIncomes.map(i=>({...i,_income:true,dueDate:i.date}))]
      .sort((a,b)=>(b.dueDate||b.date||'').localeCompare(a.dueDate||a.date||''))
      .forEach(r=>{ const k=r.dueDate||r.date||'__'; if(!g[k])g[k]=[]; g[k].push(r); });
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
  }, [weekExpenses, weekIncomes]);

  // Stats: all-time data
  const allGrouped = useMemo(() => {
    const g = {};
    [...allExpenses, ...allIncomes.map(i=>({...i,_income:true,dueDate:i.date}))]
      .forEach(r=>{ const k=(r.dueDate||r.date||'').slice(0,7); if(!g[k])g[k]=[]; g[k].push(r); });
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
  }, [allExpenses, allIncomes]);

  // Stats: custom range data
  const customExpenses = useMemo(() => allExpenses.filter(r=>{ const d=r.dueDate||''; return d>=customStart&&d<=customEnd; }), [allExpenses, customStart, customEnd]);
  const customIncomes  = useMemo(() => allIncomes.filter(i=>{ const d=i.date||''; return d>=customStart&&d<=customEnd; }), [allIncomes, customStart, customEnd]);
  const customSpanDays = useMemo(() => {
    if (!customStart||!customEnd) return 1;
    return Math.floor((new Date(customEnd)-new Date(customStart))/86400000)+1;
  }, [customStart, customEnd]);
  const customGrouped = useMemo(() => {
    const g = {}; const byMonth = customSpanDays > 35;
    [...customExpenses, ...customIncomes.map(i=>({...i,_income:true,dueDate:i.date}))]
      .sort((a,b)=>(b.dueDate||b.date||'').localeCompare(a.dueDate||a.date||''))
      .forEach(r=>{ const raw=r.dueDate||r.date||'__'; const k=byMonth?raw.slice(0,7):raw; if(!g[k])g[k]=[]; g[k].push(r); });
    return Object.entries(g).sort((a,b)=>b[0].localeCompare(a[0]));
  }, [customExpenses, customIncomes, customSpanDays]);

  // Period flags — must be top-level (not inside `if`) to allow useMemo below
  const isMonth  = statsPeriod === 'month';
  const isYear   = statsPeriod === 'year';
  const isWeek   = statsPeriod === 'week';
  const isAll    = statsPeriod === 'all';
  const isCustom = statsPeriod === 'custom';

  const currentYM = todayStr.slice(0, 7);
  const _countFM = (s, e) => {
    if (!firstRecordMonth || !s || !e) return 0;
    const from = s > firstRecordMonth ? s : firstRecordMonth;
    const to   = e < currentYM ? e : currentYM;
    if (from > to) return 0;
    const [sy, sm] = from.split('-').map(Number);
    const [ey, em] = to.split('-').map(Number);
    return (ey - sy) * 12 + (em - sm) + 1;
  };
  const fixedMonthsForPeriod = isMonth ? 1
    : isYear   ? _countFM(`${statsYearState}-01`, `${statsYearState}-12`)
    : isAll    ? _countFM(firstRecordMonth || currentYM, currentYM)
    : isCustom ? _countFM(customStart ? customStart.slice(0,7) : '', customEnd ? customEnd.slice(0,7) : '')
    : 0; // week: skip fixed items (sub-monthly period)

  const displayExpenses = isMonth ? monthExpenses : isYear ? yearExpenses : isWeek ? weekExpenses : isCustom ? customExpenses : allExpenses;
  const displayIncomes  = isMonth ? monthIncomes  : isYear ? yearIncomes  : isWeek ? weekIncomes  : isCustom ? customIncomes  : allIncomes;
  const incomeCatExpTotal = displayExpenses.filter(r=>r.category===INCOME_CAT_ID).reduce((s,r)=>s+(r.amount||0),0);
  const rawExpTotal     = displayExpenses.filter(r=>r.category!==INCOME_CAT_ID).reduce((s,r)=>s+(r.amount||0),0);
  const rawIncTotal     = displayIncomes.reduce((s,i)=>s+(i.amount||0),0) + incomeCatExpTotal;
  const displayCatTotals = useMemo(() => {
    const m = {};
    displayExpenses.filter(r=>r.category!==INCOME_CAT_ID).forEach(r => { const c=r.category||'其他'; m[c]=(m[c]||0)+(r.amount||0); });
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  }, [displayExpenses]);
  const displayCatCounts = useMemo(() => {
    const m = {};
    displayExpenses.filter(r=>r.category!==INCOME_CAT_ID).forEach(r => { const c=r.category||'其他'; m[c]=(m[c]||0)+1; });
    return m;
  }, [displayExpenses]);
  const displayPieSlices = useMemo(() =>
    displayCatTotals.map(([cat,amt])=>({ hex:getCat(cat).hex, amount:amt, cat })),
    [displayCatTotals, getCat]
  );

  if (subView === 'stats') {
    // Period labels
    const smLabel = `${statsMonthState.slice(0,4)}年${parseInt(statsMonthState.slice(5,7))}月`;
    const syLabel = `${statsYearState}年`;
    const fmtDate = s => { const [,m,d]=s.split('-'); return `${parseInt(m)}/${parseInt(d)}`; };
    const weekLabel = `${fmtDate(weekStart)} – ${fmtDate(todayStr)}`;
    const customLabel = customStart && customEnd
      ? (customSpanDays > 35
          ? `${customStart.slice(0,7)} – ${customEnd.slice(0,7)}`
          : `${fmtDate(customStart)} – ${fmtDate(customEnd)}`)
      : '自訂區間';
    const periodLabel = isMonth ? smLabel : isYear ? syLabel : isWeek ? weekLabel : isCustom ? customLabel : '全部期間';

    const displayExpTotal = rawExpTotal + fixedExTotal * fixedMonthsForPeriod;
    const displayIncTotal = rawIncTotal + fixedInTotal * fixedMonthsForPeriod;
    const displayBalance  = displayIncTotal - displayExpTotal;
    const displayExpCount = displayExpenses.length;
    const displayIncCount = displayIncomes.length;
    const displayPieTotal = rawExpTotal;
    const displayGrouped  = isMonth ? monthGrouped : isYear ? yearGrouped : isWeek ? weekGrouped : isCustom ? customGrouped : allGrouped;
    const groupByMonth    = isYear || isAll || (isCustom && customSpanDays > 35);

    // 分類篩選：activeCat 時只保留該分類的支出項目
    const catFilteredGrouped = activeCat
      ? displayGrouped
          .map(([key, its]) => [key, its.filter(r => !r._income && (r.category||'其他') === activeCat)])
          .filter(([, its]) => its.length > 0)
      : displayGrouped;

    return (
      <div className="fade-in pb-6">
        {/* Period selector pills */}
        <div className="flex gap-2 mt-4 px-4 overflow-x-auto hide-scrollbar pb-0.5">
          {[['全部期間','all'],['一週','week'],['一個月','month'],['一年','year'],['自訂','custom']].map(([lbl,val]) => (
            <button key={val} onClick={() => setStatsPeriod(val)}
              className="flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-all shadow-sm"
              style={statsPeriod===val?{background:'#1C1C1E',color:'#FFF'}:{background:'#FFF',color:'#6B7280'}}>
              {lbl}
            </button>
          ))}
        </div>

        {/* Navigator — month / year only */}
        {(isMonth || isYear) && (
          <div className="mx-4 mt-2 bg-white rounded-2xl shadow-sm flex items-center px-1">
            <button onClick={() => isYear ? setStatsYear(y => String(parseInt(y)-1)) : navigateStatsMonth(-1)}
              className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 active:bg-gray-200 transition-colors">
              <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
            </button>
            <div className="flex-1 text-center text-base font-semibold text-gray-700">{periodLabel}</div>
            <button onClick={() => isYear ? setStatsYear(y => String(parseInt(y)+1)) : navigateStatsMonth(1)}
              className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 active:bg-gray-200 transition-colors">
              <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        )}

        {/* Custom date range inputs */}
        {isCustom && (
          <div className="mx-4 mt-2 bg-white rounded-2xl shadow-sm flex items-center gap-2 px-4 py-3">
            <input type="date" value={customStart} max={customEnd} onChange={e => setCustomStart(e.target.value)}
              className="flex-1 text-sm text-gray-700 border-0 outline-none bg-transparent" />
            <span className="text-gray-300 text-sm flex-shrink-0">—</span>
            <input type="date" value={customEnd} min={customStart} onChange={e => setCustomEnd(e.target.value)}

          </div>
        )}

        <div className="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">
          <div className="grid grid-cols-3 divide-x divide-gray-100">
            <div className="px-3 py-4 flex flex-col items-center">
              <div className="text-xs text-gray-400 mb-1.5">收入</div>
              <div className="text-base text-gray-400 leading-tight" style={{fontWeight:300,fontVariantNumeric:'tabular-nums'}}>{displayIncTotal.toLocaleString()}</div>
              <div className="text-xs text-gray-300 mt-1">{displayIncCount}筆{fixedInTotal>0&&fixedMonthsForPeriod>0?'+固定':''}</div>
            </div>
            <div className="px-3 py-4 flex flex-col items-center">
              <div className="text-xs text-gray-400 mb-1.5">支出</div>
              <div className="text-base text-gray-400 leading-tight" style={{fontWeight:300,fontVariantNumeric:'tabular-nums'}}>{displayExpTotal.toLocaleString()}</div>
              <div className="text-xs text-gray-300 mt-1">{displayExpCount}筆{fixedExTotal>0&&fixedMonthsForPeriod>0?'+固定':''}</div>
            </div>
            <div className="px-3 py-4 flex flex-col items-center">
              <div className="text-xs text-gray-400 mb-1.5">損益</div>
              <div className="text-base leading-tight" style={{fontWeight:400,fontVariantNumeric:'tabular-nums',color:displayBalance>=0?'#4A9E92':'#CC3C55'}}>

              </div>
              <div className="text-xs text-gray-300 mt-1">{periodLabel}</div>
            </div>
          </div>
        </div>

        {/* Fixed items — month mode only */}
        {isMonth && <div className="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">

            <div className="text-xs font-semibold text-gray-500">每月固定</div>
            <div className="flex items-center gap-1">
              {(fixedIncomes.length > 0 || fixedExpenses.length > 0) && (
                <button onClick={() => setFixedExpanded(v => !v)}
                  className="text-xs text-gray-400 font-medium px-2 py-1 rounded-lg hover:bg-gray-50 transition-colors flex items-center gap-1">
                  <svg className={`w-3 h-3 transition-transform ${fixedExpanded?'rotate-90':''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                  {fixedExpanded ? '收合' : '明細'}
                </button>
              )}
              <button onClick={onManageFixed} className="text-xs text-[#E8940A] font-medium px-2 py-1 rounded-lg hover:bg-[#FEF3DC] transition-colors">管理</button>
            </div>
          </div>
          {(fixedIncomes.length > 0 || fixedExpenses.length > 0) ? (
            <div className="grid grid-cols-2 divide-x divide-gray-100">
              {[['固定收入', fixedIncomes, '#34C759'], ['固定支出', fixedExpenses, '#FF3B30']].map(([lbl, items, color]) => (
                <div key={lbl} className="p-3">
                  <div className="text-xs text-gray-400 mb-1.5">{lbl}</div>
                  {items.length === 0 ? <div className="text-xs text-gray-300">未設定</div> : <>
                    {fixedExpanded && items.map(i => (
                      <div key={i.id} className="flex items-center justify-between mb-1.5 gap-2">
                        <span className="text-xs text-gray-600 truncate">{i.name}</span>
                        <span className="text-xs font-semibold flex-shrink-0" style={{color}}>{i.amount.toLocaleString()}</span>
                      </div>
                    ))}
                    <div className={`flex justify-between ${fixedExpanded&&items.length>0?'mt-2 pt-2 border-t border-gray-100':''}`}>
                      <span className="text-xs text-gray-400">{fixedExpanded?'小計':'合計'}</span>
                      <span className="text-xs font-bold" style={{color}}>{items.reduce((s,i)=>s+i.amount,0).toLocaleString()}</span>
                    </div>
                  </>}
                </div>
              ))}
            </div>
          ) : (
            <button onClick={onManageFixed} className="w-full py-5 flex flex-col items-center gap-1.5 text-gray-300 hover:bg-gray-50 transition-colors">

              <span className="text-xs">新增固定收入／支出</span>
            </button>
          )}
        </div>}

        {/* Donut + category list */}
        {displayCatTotals.length > 0 && (
          <div className="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden">
            <div className="px-4 pt-4 pb-2 cursor-pointer" onClick={() => setActiveCat(null)}>
              <DonutChart slices={displayPieSlices} total={displayPieTotal} getCat={getCat}
                activeCat={activeCat} onSliceClick={cat => setActiveCat(activeCat===cat?null:cat)}/>
            </div>
            <div className="border-t border-gray-100 px-4 pt-2 pb-3">
              <div className="text-xs font-semibold text-gray-400 mb-2 mt-1">分類資訊</div>
              {displayCatTotals.map(([cat,amt]) => {
                const info = getCat(cat); const IconComp = CAT_SVG[cat];
                const count = displayCatCounts[cat]||0; const isActive = activeCat===cat;
                return (
                  <div key={cat} onClick={() => setActiveCat(isActive?null:cat)}
                    className="flex items-center gap-3 py-2.5 border-b border-gray-50 last:border-0 cursor-pointer rounded-lg px-1 transition-all">
                    <div className="w-9 h-9 rounded-2xl flex items-center justify-center flex-shrink-0 transition-all"
                      style={{background: isActive ? info.hex+'30' : info.hex+'18', color: info.hex, boxShadow: isActive ? `0 0 0 2px white, 0 0 0 3px ${info.hex}` : 'none'}}>
                      {IconComp?<IconComp size={17}/>:<span className="text-base">{info.emoji}</span>}
                    </div>
                    <span className="flex-1 text-sm font-medium text-gray-700">{info.label}</span>
                    <span className="text-sm text-gray-400 w-8 text-center">{count}</span>
                    <span className="text-sm font-semibold w-20 text-right" style={{color:isActive?info.hex:'#374151'}}>${amt.toLocaleString()}</span>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* Record list — daily (month) or monthly (year) */}
        {catFilteredGrouped.length > 0 && (
          <div className="mx-4 mt-3 mb-2">
            <div className="flex items-center justify-between px-1 mb-2">
              {activeCat ? (
                <>
                  <div className="flex items-center gap-1.5">
                    <div className="w-3 h-3 rounded-full flex-shrink-0" style={{background: getCat(activeCat).hex}}></div>
                    <span className="text-xs font-semibold" style={{color: getCat(activeCat).hex}}>{getCat(activeCat).label}</span>
                    <span className="text-xs text-gray-400">明細</span>
                  </div>
                  <button onClick={() => setActiveCat(null)}
                    className="text-xs text-gray-400 hover:text-gray-600 flex items-center gap-0.5 px-2 py-0.5 rounded-full border border-gray-200 hover:bg-gray-50 transition-colors">
                    <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                    取消篩選
                  </button>
                </>
              ) : (
                <span className="text-xs font-semibold text-gray-400">{groupByMonth ? '每月明細' : '每日明細'}</span>
              )}
            </div>
            {catFilteredGrouped.map(([key, its]) => {
              const groupExpTotal = its.filter(r=>!r._income && r.category!==INCOME_CAT_ID).reduce((s,r)=>s+(r.amount||0),0);
              const groupIncomeCatTotal = its.filter(r=>!r._income && r.category===INCOME_CAT_ID).reduce((s,r)=>s+(r.amount||0),0);
              const groupTotal = groupExpTotal - groupIncomeCatTotal;
              const groupLabel = groupByMonth
                ? `${parseInt(key.slice(0,4))}年${parseInt(key.slice(5,7))}月`
                : (() => { const [,mo,d] = key.split('-'); return `${parseInt(mo)}/${parseInt(d)}`; })();
              return (
                <div key={key} className="mb-3">
                  <div className="flex items-center justify-between px-1 mb-1.5">
                    <span className="text-xs text-gray-400 font-medium">{groupLabel}</span>
                    {groupTotal > 0 && <span className="text-xs font-semibold text-[#FF3B30]">${groupTotal.toLocaleString()}</span>}

                  <div className="bg-white rounded-2xl shadow-sm overflow-hidden divide-y divide-gray-50">
                    {its.map(r => r._income ? (
                      <div key={r.id} className="flex items-center gap-3 px-4 py-3">

                        <div className="flex-1 min-w-0 text-sm font-medium text-gray-800 truncate">{r.title}</div>
                        <div className="text-sm font-semibold text-[#34C759] flex-shrink-0">+${(r.amount||0).toLocaleString()}</div>
                      </div>
                    ) : (() => {
                      const isIncomeCat = r.category === INCOME_CAT_ID;
                      const cat = getCat(r.category||'其他'); const Icon = CAT_SVG[cat.id];

                        <button key={r.id} onClick={() => onEditExpense(r)}

                          <div className="w-9 h-9 rounded-2xl flex items-center justify-center flex-shrink-0"
                            style={{background: isIncomeCat?'#34C75918':cat.hex+'18', color: isIncomeCat?'#34C759':cat.hex}}>
                            {isIncomeCat
                              ? <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                              : Icon?<Icon size={17}/>:<span className="text-base">{cat.emoji}</span>}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="text-sm font-medium text-gray-800 truncate">{r.title}</div>
                            {r.merchant && <div className="text-xs text-gray-400 truncate">{r.merchant}</div>}
                          </div>
                          <div className={`text-sm font-semibold flex-shrink-0 ${isIncomeCat?'text-[#34C759]':'text-gray-700'}`}>
                            {isIncomeCat?'+':''}${(r.amount||0).toLocaleString()}
                          </div>
                        </button>
                      );
                    })())}
                  </div>
                </div>
              );
            })}
          </div>
        )}

          <div className="mx-4 mt-6 flex flex-col items-center py-12 text-gray-400">
            {activeCat ? (
              <>
                <div className="text-4xl mb-3">{getCat(activeCat).emoji}</div>
                <div className="text-sm">{periodLabel}沒有「{getCat(activeCat).label}」的記錄</div>
                <button onClick={() => setActiveCat(null)} className="mt-3 text-xs text-[#E8940A] underline">取消篩選</button>
              </>
            ) : (
              <>
                <div className="text-4xl mb-3">📊</div>
                <div className="text-sm">{periodLabel}沒有記錄</div>
              </>
            )}
          </div>
        )}
      </div>
    );

  // ── Day view (default) ────────────────────────────────────────────────────
  return (
    <div className="fade-in pb-36">

      {/* Day navigation bar */}
      <div className="mx-4 mt-4 bg-white rounded-2xl shadow-sm flex items-center px-1 py-1.5">
        <button onClick={() => onNavigateDate(-1)}
          className="w-11 h-11 flex items-center justify-center rounded-full hover:bg-gray-100 active:bg-gray-200 transition-colors flex-shrink-0">
          <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
        </button>
        <button onClick={() => setShowDatePicker(true)} className="flex-1 flex flex-col items-center py-1 active:opacity-70 transition-opacity">
          <span className={`text-base font-semibold ${isToday ? 'text-[#E8940A]' : 'text-gray-700'}`}>{dateLabel}</span>
          <span className="text-[10px] text-gray-400 mt-0.5 flex items-center gap-0.5">
            <svg className="w-2.5 h-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            選日期
          </span>
        </button>
        <div className="flex items-center gap-1 flex-shrink-0 pr-1">
          {isToday
            ? dayExpenseTotal > 0 && <span className="text-sm font-bold" style={{color:'#FF6B00'}}>${dayExpenseTotal.toLocaleString()}</span>
            : <button onPointerDown={e=>{e.preventDefault();onJumpToDate(todayStr);}}
                style={{touchAction:'manipulation'}}
                className="px-3 py-1.5 rounded-full text-xs font-bold bg-[#E8940A] text-white active:opacity-75">
                今日
              </button>
          }
          <button onClick={() => onNavigateDate(1)}
            className={`w-11 h-11 flex items-center justify-center rounded-full transition-colors ${isToday?'opacity-20':'hover:bg-gray-100 active:bg-gray-200'}`}>
            <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>

      {/* Day income/expense totals strip (only if both exist) */}
      {(dayExpenseTotal > 0 || dayIncomeTotal > 0) && (
        <div className="mx-4 mt-2 flex gap-2">
          {dayExpenseTotal > 0 && (
            <div className="flex-1 bg-[#FF3B30]/8 rounded-xl px-3 py-2 flex items-center justify-between">
              <span className="text-xs text-gray-500">支出</span>
              <span className="text-sm font-bold text-[#FF3B30]">${dayExpenseTotal.toLocaleString()}</span>
            </div>
          )}
          {dayIncomeTotal > 0 && (
            <div className="flex-1 bg-[#34C759]/8 rounded-xl px-3 py-2 flex items-center justify-between">
              <span className="text-xs text-gray-500">收入</span>
              <span className="text-sm font-bold text-[#34C759]">${dayIncomeTotal.toLocaleString()}</span>
            </div>
          )}
        </div>
      )}

      {/* Fixed items quick access row */}
      <div className="mx-4 mt-2 bg-white rounded-xl shadow-sm overflow-hidden">
        <div className="px-2 py-2.5 flex items-center gap-2">
          <button onClick={() => setFixedExpanded(v => !v)}
            className="w-8 h-8 flex items-center justify-center rounded-lg active:bg-gray-100 transition-colors flex-shrink-0">
            <svg className={`w-4 h-4 transition-transform ${fixedExpanded ? 'text-[#E8940A]' : 'text-gray-300'}`}
              fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
          </button>
          <span className="text-xs text-gray-400 font-medium">每月固定</span>
          {(fixedInTotal > 0 || fixedExTotal > 0) ? (
            <div className="flex items-center gap-1.5 flex-1">
              {fixedInTotal > 0 && <span className="text-xs font-semibold text-[#34C759]">{fixedInTotal.toLocaleString()}</span>}
              {fixedInTotal > 0 && fixedExTotal > 0 && <span className="text-[10px] text-gray-200">|</span>}
              {fixedExTotal > 0 && <span className="text-xs font-semibold text-[#FF3B30]">{fixedExTotal.toLocaleString()}</span>}
            </div>

            <span className="flex-1 text-xs text-gray-300">尚未設定</span>
          )}
          <button onClick={onManageFixed} className="text-xs text-[#E8940A] font-semibold px-2.5 py-1 rounded-lg bg-[#FEF3DC] active:bg-[#E8940A]/20 transition-colors">管理</button>
        </div>
        {fixedExpanded && (fixedInTotal > 0 || fixedExTotal > 0) && (
          <div className="border-t border-gray-50 grid grid-cols-2 divide-x divide-gray-100">
            {[['固定收入', fixedIncomes, '#34C759'], ['固定支出', fixedExpenses, '#FF3B30']].map(([lbl, its, color]) => (
              <div key={lbl} className="p-3">
                <div className="text-[10px] text-gray-400 font-medium mb-1.5">{lbl}</div>
                {its.length === 0
                  ? <div className="text-[10px] text-gray-300">未設定</div>
                  : its.map(i => (
                    <div key={i.id} className="flex items-center justify-between gap-2 mb-1 last:mb-0">
                      <span className="text-xs text-gray-600 truncate">{i.name}</span>
                      <span className="text-xs font-semibold flex-shrink-0" style={{color}}>{i.amount.toLocaleString()}</span>
                    </div>
                  ))
                }
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Records list */}
      {!hasRecords ? (
        <div className="mx-4 mt-3 bg-white rounded-2xl shadow-sm flex flex-col items-center py-16 text-gray-400">
          <div className="text-4xl mb-3">💸</div>
          <div className="text-sm font-medium">{isToday ? '今天還沒有記錄' : '這天沒有記錄'}</div>
          <div className="text-xs mt-1 text-gray-300">點擊箭頭切換日期</div>
        </div>

        <div className="mx-4 mt-3 bg-white rounded-2xl shadow-sm overflow-hidden divide-y divide-gray-50">
          {dayExpenses.map(r => {
            const isIncomeCat = r.category === INCOME_CAT_ID;
            const cat = getCat(r.category || '其他');
            const IconComp = CAT_SVG[cat.id];
            return (
              <button key={r.id} onClick={() => onEditExpense(r)}
                className="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-gray-50 active:bg-gray-100 transition-colors text-left">
                <div className="w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0"
                  style={{background: isIncomeCat?'#34C75918':cat.hex+'18', color: isIncomeCat?'#34C759':cat.hex}}>
                  {isIncomeCat
                    ? <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
                    : IconComp ? <IconComp size={19}/> : <span className="text-lg">{cat.emoji}</span>}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium text-gray-800 truncate">{r.title}</div>
                  {r.merchant && <div className="text-xs text-gray-400 mt-0.5 truncate">{r.merchant}</div>}

                <div className={`text-base font-semibold flex-shrink-0 ${isIncomeCat?'text-[#34C759]':'text-gray-700'}`}>
                  {isIncomeCat?'+':''}${(r.amount || 0).toLocaleString()}
                </div>
              </button>
            );
          })}
          {dayIncomes.map(i => (
            <button key={i.id} onClick={() => onEditIncome(i)}
              className="w-full flex items-center gap-3 px-4 py-3.5 hover:bg-gray-50 active:bg-gray-100 transition-colors text-left">
              <div className="w-10 h-10 rounded-2xl flex items-center justify-center flex-shrink-0" style={{background:'#34C75918', color:'#34C759'}}>
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-medium text-gray-800 truncate">{i.title}</div>
                {i.note && <div className="text-xs text-gray-400 mt-0.5 truncate">{i.note}</div>}
              </div>
              <div className="text-base font-semibold text-[#34C759] flex-shrink-0">
                +${(i.amount || 0).toLocaleString()}
              </div>
            </button>
          ))}
        </div>
      )}

      {/* ── Date picker sheet ── */}
      {showDatePicker && (
        <div className="fixed inset-0 z-[100] flex items-end bg-black/40" style={{paddingBottom:67}} onClick={() => setShowDatePicker(false)}>
          <div className="w-full max-w-md mx-auto bg-white rounded-t-3xl shadow-2xl flex flex-col overflow-hidden"
            style={{maxHeight:'min(80vh, 480px)'}} onClick={e => e.stopPropagation()}>

            {/* Drag handle */}
            <div className="flex justify-center pt-2 pb-1 flex-shrink-0">
              <div className="w-10 h-1 bg-gray-300 rounded-full"/>
            </div>

            {/* Month nav */}
            <div className="flex items-center px-4 py-1 flex-shrink-0">
              <button onPointerDown={e=>{e.preventDefault();navigateCalMonth(-1);}}
                className="w-9 h-9 flex items-center justify-center rounded-full active:bg-gray-100" style={{touchAction:'manipulation'}}>
                <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
              </button>
              <div className="flex-1 text-center text-sm font-bold text-gray-800">
                {calDisplayMonth.slice(0,4)}年{parseInt(calDisplayMonth.slice(5,7))}月
              </div>
              <button onPointerDown={e=>{e.preventDefault();navigateCalMonth(1);}}
                className="w-9 h-9 flex items-center justify-center rounded-full active:bg-gray-100" style={{touchAction:'manipulation'}}>
                <svg className="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>

            {/* Weekday labels */}
            <div className="grid grid-cols-7 px-3 flex-shrink-0">
              {['日','一','二','三','四','五','六'].map(d => (
                <div key={d} className="text-center text-xs font-medium text-gray-400 py-0.5">{d}</div>
              ))}
            </div>

            {/* Day grid */}
            <div className="grid grid-cols-7 px-3 flex-1">
              {calDays.map((cell, i) => (
                <button key={i}
                  onPointerDown={e => { e.preventDefault(); onJumpToDate(cell.date); }}
                  style={{touchAction:'manipulation'}}
                  className={`h-8 w-full flex items-center justify-center rounded-xl text-sm transition-colors
                    ${cell.selected ? 'bg-[#E8940A] text-white font-bold' :
                      cell.today    ? 'text-[#E8940A] font-bold' :
                      cell.other    ? 'text-gray-300' :

// ── CalcSheet ───────────────────────────────────────────────────────────────
function CalcSheet({ initial = '', onApply, onClose }) {
  const [expr, setExpr] = useState(initial ? String(initial) : '');
  const [prevExpr, setPrevExpr] = useState(''); // shown small above result

  const evalExpr = (e) => {
    try {
      // Simple left-to-right parser supporting +−×÷
      const str = e.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
      if (!str || !/^[\d+\-*/.() ]+$/.test(str)) return null;
      // Use indirect eval via a simple shunting-yard-style approach
      // Split into tokens
      const tokens = str.match(/(\d+\.?\d*|[+\-*/()])/g);
      if (!tokens) return null;
      // Evaluate via recursive descent
      let pos = 0;
      const peek = () => tokens[pos];
      const consume = () => tokens[pos++];
      const parseNum = () => {
        const t = consume();
        if (t === '(') { const v = parseAdd(); consume(); /* ) */ return v; }
        return parseFloat(t);
      };
      const parseMul = () => {
        let v = parseNum();
        while (peek() === '*' || peek() === '/') {
          const op = consume();
          const r = parseNum();
          v = op === '*' ? v * r : v / r;
        }
        return v;
      };
      const parseAdd = () => {
        let v = parseMul();
        while (peek() === '+' || peek() === '-') {
          const op = consume();
          const r = parseMul();
          v = op === '+' ? v + r : v - r;
        }
        return v;
      };
      const result = parseAdd();
      return isFinite(result) ? parseFloat(result.toFixed(10)) : null;
    } catch(err) { return null; }
  };

  const ops = ['+','−','×','÷'];

  const press = (key) => {
    if (key === 'AC') { setExpr(''); setPrevExpr(''); return; }
    if (key === '←') { setExpr(e => e.slice(0,-1)); return; }
    if (key === '%') {
      const r = evalExpr(expr);
      if (r !== null) { setPrevExpr(expr + '%'); setExpr(String(parseFloat((r/100).toFixed(10)))); }
      return;
    }
    if (key === '=') {
      const r = evalExpr(expr);
      if (r !== null) {
        setPrevExpr(expr + ' =');
        setExpr(String(parseFloat(r.toFixed(10)).toString()));
      }
      return;
    }
    if (key === '✓') {
      const r = evalExpr(expr) ?? parseFloat(expr);
      if (r !== null && isFinite(r) && r > 0) {
        onApply(String(parseFloat(r.toFixed(2))));
        onClose();
      }
      return;
    }
    setExpr(e => {
      // Replace trailing operator with new operator
      if (ops.includes(key) && ops.includes(e.slice(-1))) return e.slice(0,-1) + key;
      // Don't start with operator (except minus)
      if (ops.includes(key) && key !== '−' && e === '') return e;
      // Don't allow double decimal in current number
      if (key === '.') {
        const parts = e.split(/[+\-×÷]/);
        if (parts[parts.length-1].includes('.')) return e;
      }
      return e + key;
    });
    setPrevExpr('');
  };

  const display = expr || '0';

  const btn = (key, type, extra='') => {
    const base = 'flex items-center justify-center h-[58px] rounded-2xl text-xl font-semibold active:scale-95 transition-all select-none cursor-pointer';
    const color = type==='op' ? 'bg-amber-400 text-white' : type==='fn' ? 'bg-gray-200 text-gray-700' : type==='eq' ? 'bg-[#E8940A] text-white' : 'bg-gray-100 text-gray-800';
    return (
      <button key={key} onClick={() => press(key)} className={`${base} ${color} ${extra}`}>{key}</button>
    );
  };

  return (
    <div className="fixed inset-0 z-[60] flex items-end justify-center" onClick={e => e.stopPropagation()}>
      <div className="absolute inset-0 bg-black/30" onClick={onClose}/>
      <div className="relative w-full max-w-md bg-[#FAF6F1] rounded-t-3xl shadow-2xl">
        <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1 bg-gray-300 rounded-full"/></div>
        {/* Close */}
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-1">
          <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        {/* Display */}
        <div className="px-5 pt-2 pb-4 text-right">
          <div className="text-xs text-gray-400 h-4">{prevExpr}</div>
          <div className="text-4xl font-light text-gray-800 break-all mt-1 leading-tight"
            style={{fontSize: display.length > 12 ? '1.6rem' : display.length > 8 ? '2rem' : '2.25rem'}}>
            {display}
          </div>
        </div>
        {/* Keypad */}
        <div className="px-3 pb-8 space-y-2.5">
          <div className="grid grid-cols-4 gap-2.5">
            {btn('AC','fn')} {btn('←','fn')} {btn('%','fn')} {btn('÷','op')}
          </div>
          <div className="grid grid-cols-4 gap-2.5">
            {btn('7','n')} {btn('8','n')} {btn('9','n')} {btn('×','op')}
          </div>
          <div className="grid grid-cols-4 gap-2.5">
            {btn('4','n')} {btn('5','n')} {btn('6','n')} {btn('−','op')}
          </div>
          <div className="grid grid-cols-4 gap-2.5">
            {btn('1','n')} {btn('2','n')} {btn('3','n')} {btn('+','op')}
          </div>
          <div className="grid grid-cols-4 gap-2.5">
            {btn('0','n','col-span-2')} {btn('.','n')} {btn('=','eq')}
          </div>
          <button onClick={() => press('✓')}
            className="w-full h-[52px] rounded-2xl text-base font-bold text-white active:scale-95 transition-all"
            style={{background:'linear-gradient(135deg,#E8940A,#D4820A)'}}>
            套用金額
          </button>
        </div>
      </div>
    </div>
  );
}

// ── RecordModal (income + expense combined) ────────────────────────────────
function calcReducer(state, key) {
  const { expr, prev, op } = state;
  if (key === '⌫') {
    if (expr.length > 0) return { ...state, expr: expr.slice(0, -1) };
    if (op !== null) return { expr: String(prev ?? ''), prev: null, op: null };
    return state;
  }
  if (key === '+' || key === '−') {
    const cur = parseFloat(expr) || 0;
    const base = op !== null && prev !== null
      ? (op === '+' ? prev + cur : Math.max(0, prev - cur))
      : cur;
    return { expr: '', prev: base, op: key };
  }
  if (key === '.') {
    if (!expr.includes('.')) return { ...state, expr: expr + '.' };
    return state;
  }
  // digit
  return { ...state, expr: expr.length >= 10 ? expr : (expr === '0' ? key : expr + key) };
}

function RecordModal({ mode, record, cats, recentMerchants = [], onSave, onDelete, onClose, onGoToSettings }) {
  const today = localDateStr();
  const [recordType, setRecordType] = useState(record?.type || 'expense');
  const [title, setTitle]     = useState(record?.title    || '');
  const [date,  setDate]      = useState(record?.date     || today);
  const [category, setCategory] = useState(record?.category || (cats && cats[0]?.id) || '');
  const [merchant, setMerchant] = useState(record?.merchant || '');
  const [saveError, setSaveError] = useState('');
  const [calcState, dispatchCalc] = useReducer(calcReducer,
    { expr: record?.amount ? String(record.amount) : '', prev: null, op: null });
  const { expr: calcExpr, prev: prevVal, op: pendingOp } = calcState;

  const isIncome    = recordType === 'income';
  const accentColor = isIncome ? '#34C759' : '#FF3B30';
  const dateLabel   = date === today ? '今日' : date.slice(5).replace('-', '/');

  const computedAmt = () => {
    const cur = parseFloat(calcExpr) || 0;
    if (pendingOp !== null && prevVal !== null)
      return pendingOp === '+' ? prevVal + cur : Math.max(0, prevVal - cur);
    return cur;
  };

  const pressKey = (key) => {
    setSaveError('');
    dispatchCalc(key);
  };

  const handleSave = () => {
    const finalAmount = computedAmt();
    if (!finalAmount || finalAmount <= 0) { setSaveError('請輸入金額'); return; }
    const autoTitle = merchant.trim() || cats?.find(c => c.id === category)?.label || (isIncome ? '收入' : '支出');
    onSave({
      type: recordType,
      title: title.trim() || autoTitle,
      amount: finalAmount,
      date,
      note: '',
      category: !isIncome ? (category || null) : undefined,
      merchant: !isIncome ? merchant.trim() : undefined,
    });
  };

  const displayTotal = computedAmt();
  const displayStr   = '$' + (displayTotal > 0 ? displayTotal.toLocaleString() : (calcExpr || '0'));

  const kpBtn = (label, type) => {
    const base = 'flex items-center justify-center h-[56px] rounded-2xl text-xl font-semibold active:opacity-60 transition-opacity select-none cursor-pointer';
    const kpStyle = { touchAction: 'manipulation' };
    if (type === 'del') return (
      <button key={label} onPointerDown={e=>{e.preventDefault();pressKey('⌫');}} className={`${base} text-[#FF9500]`} style={kpStyle}>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="15" y1="9" x2="19" y2="13"/><line x1="19" y1="9" x2="15" y2="13"/>
        </svg>
      </button>
    );
    if (type === 'op') return (
      <button key={label} onPointerDown={e=>{e.preventDefault();pressKey(label);}} className={`${base} text-[#FF9500] text-2xl`} style={kpStyle}>{label}</button>
    );
    if (type === 'confirm') return (
      <button key="confirm" onPointerDown={e=>{e.preventDefault();handleSave();}} className={`${base} text-[#FF9500]`} style={kpStyle}>
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12l5 5L19 7"/>
        </svg>
      </button>
    );
    return <button key={label} onPointerDown={e=>{e.preventDefault();pressKey(label);}} className={`${base} text-white`} style={kpStyle}>{label}</button>;
  };

  return (
    <div className="fixed inset-0 z-50 flex flex-col justify-end">
      <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={onClose}/>
      <div className="relative flex flex-col w-full max-w-md mx-auto rounded-t-3xl overflow-hidden shadow-2xl"
        style={{maxHeight:'92vh', background:'#FAF6F1'}}>

        {/* ── Light section ── */}
        <div className="overflow-y-auto" style={{flex:'1 1 auto'}}>

          {/* Header: close | date | delete */}
          <div className="flex items-center justify-between px-4 pt-4 pb-2">
            <button onClick={onClose}
              className="w-8 h-8 flex items-center justify-center rounded-full bg-white/80 text-gray-500 shadow-sm">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
            <label className="relative px-5 py-1.5 bg-white rounded-full text-sm font-medium text-gray-600 shadow-sm cursor-pointer">
              {dateLabel}
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                className="absolute inset-0 opacity-0 w-full cursor-pointer"/>
            </label>
            {onDelete
              ? <button onClick={onDelete} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/80 text-red-400 shadow-sm">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                  </svg>
                </button>
              : <div className="w-8"/>}
          </div>

          {/* Type toggle + Amount */}
          <div className="px-5 pb-3">
            {mode === 'add' && (
              <div className="flex mb-2">
                <div className="flex bg-white rounded-full p-0.5 shadow-sm">
                  <button onClick={() => setRecordType('income')}
                    className={`px-3 py-1 text-sm font-semibold rounded-full transition-all ${isIncome ? 'bg-gray-700 text-white shadow' : 'text-gray-400'}`}>
                    + 收入
                  </button>
                  <button onClick={() => setRecordType('expense')}
                    className={`px-3 py-1 text-sm font-semibold rounded-full transition-all ${!isIncome ? 'bg-gray-700 text-white shadow' : 'text-gray-400'}`}>
                    − 支出
                  </button>
                </div>
              </div>
            )}
            {pendingOp !== null && prevVal !== null && (
              <div className="text-right text-sm text-gray-400 mb-0.5">{prevVal.toLocaleString()} {pendingOp}</div>
            )}
            <div className="text-right font-light" style={{
              color: '#1C1C1E',
              fontSize: displayStr.length > 10 ? '2.4rem' : displayStr.length > 7 ? '2.8rem' : '3.2rem',
              lineHeight: 1.1
            }}>
              {displayStr}
            </div>
          </div>

          {/* Category grid */}
          {!isIncome && cats && (
            <div className="mx-3 bg-white rounded-2xl shadow-sm px-2 py-3">
              <div className="grid grid-cols-5 gap-y-3">
                {cats.map(c => {
                  const isSelected = category === c.id;
                  const IconComp = CAT_SVG[c.id];
                  return (
                    <button key={c.id} onClick={() => setCategory(c.id)} className="flex flex-col items-center gap-1">
                      <div className="w-11 h-11 rounded-2xl flex items-center justify-center transition-all"
                        style={{background: isSelected ? c.hex+'30' : c.hex+'18', color: c.hex, boxShadow: isSelected ? `0 0 0 2px white, 0 0 0 3px ${c.hex}` : 'none'}}>
                        {IconComp ? <IconComp size={20}/> : <span className="text-lg">{c.emoji}</span>}
                      </div>
                      <span className={`text-[10px] font-medium leading-tight text-center transition-colors ${isSelected ? 'text-gray-800' : 'text-gray-400'}`}>{c.label}</span>
                    </button>
                  );
                })}
              </div>
              {onGoToSettings && (
                <button onClick={onGoToSettings}
                  className="w-full mt-2 pt-2 border-t border-gray-100 text-xs text-[#E8940A] font-medium text-center">
                  ＋ 新增分類
                </button>
              )}
            </div>
          )}

          {/* Note / name field */}
          <div className="mx-3 mt-2 bg-white rounded-2xl shadow-sm px-4 py-2.5 flex items-center gap-2">
            <svg className="w-4 h-4 text-gray-300 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M4 6h16M4 12h16M4 18h7"/>
            </svg>
            <input type="text" value={title} onChange={e => { setSaveError(''); setTitle(e.target.value); }}
              placeholder="點選以編輯備註（選填）"
              className="flex-1 text-sm text-gray-600 outline-none placeholder-gray-300 bg-transparent"/>
          </div>

          {/* Merchant quick tags */}
          {!isIncome && recentMerchants.length > 0 && (
            <div className="mt-2 pb-3 px-3 overflow-x-auto hide-scrollbar">
              <div className="flex gap-2" style={{width:'max-content'}}>
                {recentMerchants.map(m => (
                  <button key={m} onClick={() => setMerchant(merchant === m ? '' : m)}
                    className={`px-3 py-1.5 rounded-full text-sm border flex-shrink-0 transition-all ${
                      merchant === m ? 'border-[#E8940A] text-[#E8940A] bg-white' : 'border-gray-200 text-gray-500 bg-white'
                    }`}>{m}</button>
                ))}
              </div>
            </div>
          )}

          {saveError && <div className="mx-3 mb-2 text-center text-sm text-[#FF3B30]">{saveError}</div>}
          <div className="h-2"/>
        </div>

        {/* ── Dark keypad ── */}
        <div className="flex-shrink-0 bg-[#1C1C1E] px-3 pt-3 pb-8">
          <div className="grid grid-cols-4 gap-2">
            {kpBtn('7','n')} {kpBtn('8','n')} {kpBtn('9','n')} {kpBtn('⌫','del')}
            {kpBtn('4','n')} {kpBtn('5','n')} {kpBtn('6','n')} {kpBtn('+','op')}
            {kpBtn('1','n')} {kpBtn('2','n')} {kpBtn('3','n')} {kpBtn('−','op')}
            <label className="flex flex-col items-center justify-center h-[56px] rounded-2xl text-xs font-medium text-gray-500 cursor-pointer relative leading-tight">
              <span>{dateLabel}</span><span className="text-[10px] text-gray-600 mt-0.5">▼</span>
              <input type="date" value={date} onChange={e => setDate(e.target.value)}
                className="absolute inset-0 opacity-0 w-full cursor-pointer"/>
            </label>
            {kpBtn('0','n')} {kpBtn('.','n')} {kpBtn('✓','confirm')}
          </div>
        </div>
      </div>
    </div>
  );
}

  useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [open]);

  const handleToggle = () => {
    if (!open && btnRef.current) {
      const rect = btnRef.current.getBoundingClientRect();
      const spaceBelow = window.innerHeight - rect.bottom;
      const pickerH = 260;
      const top = spaceBelow >= pickerH ? rect.bottom + 6 : rect.top - pickerH - 6;
      const left = Math.min(rect.left, window.innerWidth - 290);
      setPickerPos({ top, left });
    }
    setOpen(v => !v);
  };

  return (
    <div ref={ref}>
      <button ref={btnRef} type="button" onClick={handleToggle}
        className={`w-12 h-10 rounded-xl border-2 text-xl flex items-center justify-center transition-all ${open ? 'border-[#E8940A] bg-[#FEF3DC]' : 'border-gray-200 bg-white hover:border-[#E8940A]/50'}`}>
        {value || '🏷️'}
      </button>
      {open && (
        <div className="fixed z-[200] bg-white rounded-2xl shadow-xl border border-gray-100 w-72 overflow-hidden"
          style={{ top: pickerPos.top, left: pickerPos.left }}>
          {/* Group tabs */}
          <div className="flex overflow-x-auto hide-scrollbar border-b border-gray-100 bg-gray-50">
            {EMOJI_GROUPS.map((g, i) => (
              <button key={i} onClick={() => setTab(i)}
                className={`px-3 py-2 text-xs font-medium whitespace-nowrap flex-shrink-0 transition-colors ${tab===i ? 'text-[#E8940A] border-b-2 border-[#E8940A] bg-white' : 'text-gray-500 hover:text-gray-700'}`}>
                {g.label}
              </button>
            ))}
          </div>
          {/* Emoji grid */}
          <div className="p-2 grid grid-cols-8 gap-0.5 max-h-48 overflow-y-auto">
            {EMOJI_GROUPS[tab].icons.map((emoji, i) => (
              <button key={i} type="button"
                onClick={() => { onChange(emoji); setOpen(false); }}
                className={`w-8 h-8 text-xl rounded-lg flex items-center justify-center hover:bg-[#FEF3DC] transition-colors active:scale-90 ${value===emoji ? 'bg-[#FEF3DC] ring-1 ring-[#E8940A]/50' : ''}`}>
                {emoji}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ── CompleteSheet ──────────────────────────────────────────────────────────
function CompleteSheet({ task, onConfirm, onCancel }) {
  const hasAmount = task.isPurchase && task.amount;

  // 偵測標題/備註中的非日期數字（可能是金額）
  const detectedAmount = React.useMemo(() => {
    if (hasAmount) return null;
    const text = (task.title || '') + ' ' + (task.notes || '');
    // 移除日期格式（YYYY-MM-DD、YYYY/MM/DD、M/D 等）
    const noDate = text
      .replace(/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/g, '')
      .replace(/\d{1,2}[-\/]\d{1,2}/g, '');
    const matches = noDate.match(/\b\d+(\.\d+)?\b/g);
    if (!matches || matches.length === 0) return null;
    const nums = matches.map(m => parseFloat(m)).filter(n => n > 0);
    return nums.length > 0 ? Math.max(...nums) : null;
  }, [task.title, task.notes, hasAmount]);

  const showAccounting = hasAmount || detectedAmount !== null;
  const [toJournal, setToJournal] = useState(false);
  const [toAccounting, setToAccounting] = useState(!!hasAmount);
  const [editAmount, setEditAmount] = useState(detectedAmount != null ? String(detectedAmount) : '');
  const amountRef = useRef(null);

  const Check = ({ on, color }) => (
    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-all ${on ? color+' border-transparent' : 'border-gray-300'}`}>
      {on && <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/></svg>}
    </div>
  );

  const handleConfirm = () => {
    let finalAmount = null;
    if (toAccounting) {
      if (hasAmount) {
        finalAmount = task.amount;
      } else {
        finalAmount = parseFloat(amountRef.current?.value || editAmount);
        if (!finalAmount || finalAmount <= 0) finalAmount = null;
      }
    }
    onConfirm({ toJournal, toAccounting, amount: finalAmount });
  };

  return (
    <div className="fixed inset-0 bg-black/40 z-50 flex items-end" onClick={onCancel}>
      <div className="w-full bg-white rounded-t-3xl shadow-xl" onClick={e => e.stopPropagation()}>
        <div className="flex justify-center pt-3 pb-2"><div className="w-10 h-1 bg-gray-200 rounded-full"/></div>
        <div className="px-5 pb-4 flex items-center gap-3">
          <div className="w-10 h-10 bg-[#34C759]/10 rounded-full flex items-center justify-center flex-shrink-0">
            <svg className="w-5 h-5 text-[#34C759]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7"/></svg>
          </div>
          <div className="min-w-0">
            <div className="text-xs text-gray-400">任務完成！</div>
            <div className="text-sm font-semibold text-gray-800 truncate">{task.title}</div>
          </div>
        </div>
        <div className="mx-4 border-t border-gray-100"/>
        <div className="px-4 pt-4 pb-3 space-y-2.5">
          <div className="text-xs font-semibold text-gray-400 px-1 mb-1">完成後要同步做什麼嗎？</div>
          <button onClick={() => setToJournal(v => !v)}
            className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all ${toJournal ? 'bg-gray-700/[0.07] ring-1 ring-gray-400/30' : 'bg-gray-50 hover:bg-gray-100'}`}>
            <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${toJournal ? 'bg-gray-200' : 'bg-white shadow-sm'}`}>📓</div>
            <div className="flex-1 text-left">
              <div className={`text-sm font-semibold ${toJournal ? 'text-gray-800' : 'text-gray-700'}`}>歸入日誌</div>
              <div className="text-xs text-gray-400 mt-0.5">以任務內容開啟日誌編輯頁</div>
            </div>
            <Check on={toJournal} color="bg-gray-700"/>
          </button>
          {showAccounting && (
            <div>
              <button onClick={() => setToAccounting(v => !v)}
                className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl transition-all ${toAccounting ? 'bg-[#34C759]/[0.07] ring-1 ring-[#34C759]/25' : 'bg-gray-50 hover:bg-gray-100'}`}>
                <div className={`w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0 ${toAccounting ? 'bg-[#34C759]/15' : 'bg-white shadow-sm'}`}>💰</div>
                <div className="flex-1 text-left">
                  <div className={`text-sm font-semibold ${toAccounting ? 'text-[#34C759]' : 'text-gray-700'}`}>記入記帳</div>
                  {hasAmount
                    ? <div className="text-xs text-gray-400 mt-0.5">NT${task.amount.toLocaleString()} 支出{task.category ? `・${task.category}` : ''}</div>
                    : <div className="text-xs text-gray-400 mt-0.5">偵測到數字 {detectedAmount}，確認後記入支出</div>
                  }
                </div>
                <Check on={toAccounting} color="bg-[#34C759]"/>
              </button>
              {toAccounting && !hasAmount && (
                <div className="mt-2 flex items-center gap-2 px-2">
                  <span className="text-xs text-gray-500 flex-shrink-0">金額 NT$</span>
                  <input
                    ref={amountRef}
                    type="text" inputMode="decimal"
                    value={editAmount}
                    onChange={e => { const v=e.target.value; if(v!==''&&!/^\d*\.?\d*$/.test(v)) return; setEditAmount(v); }}
                    onBlur={e => { if(e.target.value!==''&&!/^\d*\.?\d*$/.test(e.target.value)) setEditAmount(''); else setEditAmount(e.target.value); }}
                    placeholder="輸入金額"
                    className="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm font-semibold outline-none focus:ring-2 focus:ring-[#34C759]/25 bg-white"
                  />
                </div>
              )}
            </div>
          )}
        </div>
        <div className="px-4 pb-8 pt-1">
          <button onClick={handleConfirm}
            className="w-full py-3.5 text-white font-semibold text-sm rounded-2xl active:scale-[0.98] transition-all"
            style={{background:'linear-gradient(135deg,#5A5A5A,#2E2E2E)',boxShadow:'0 3px 10px rgba(0,0,0,0.2)'}}>
            確認完成
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Mount ──────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
